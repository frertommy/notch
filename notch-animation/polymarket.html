<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notch — Polymarket vs Notch</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0c10; }
  canvas { display: block; width: 100%; height: 100%; }
  #watchAgain {
    position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
    background: none; border: 2px solid #b2ed68; color: #b2ed68;
    font-family: 'Space Grotesk', sans-serif; font-size: 16px; font-weight: 600;
    padding: 12px 32px; border-radius: 8px; cursor: pointer;
    opacity: 0; pointer-events: none; transition: opacity 0.4s, background 0.2s;
    z-index: 10;
  }
  #watchAgain:hover { background: rgba(178,237,104,0.15); }
  #watchAgain.visible { opacity: 1; pointer-events: auto; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<button id="watchAgain">Watch Again</button>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const watchBtn = document.getElementById('watchAgain');

let W, H, S, startTime, animTime = 0, running = true, lastTimestamp = 0;
const DURATION = 18;

const BG = '#0a0c10';
const LIME = '#b2ed68';
const RED = '#ff4d4d';
const WHITE = '#ffffff';
const CYAN = '#22d3ee';
const DIM = '#2a2e38';
const DIMMER = '#181b22';
const CARD_BG = '#12151c';

// ── RESIZE ──
function resize() {
  const dpr = window.devicePixelRatio || 1;
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * dpr; canvas.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  S = Math.min(W / 800, H / 600);
}
window.addEventListener('resize', resize);
resize();

// ── EASING ──
function easeOut(t) { return 1 - Math.pow(1 - t, 3); }
function easeIn(t) { return t * t * t; }
function easeInOut(t) { return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3)/2; }
function clamp01(t) { return Math.max(0, Math.min(1, t)); }
function lerp(a, b, t) { return a + (b - a) * t; }

// ── TEXT HELPERS ──
function setFont(size, weight, family) {
  ctx.font = `${weight || 600} ${Math.round(size * S)}px '${family || 'Space Grotesk'}', sans-serif`;
}
function setMono(size, weight) {
  ctx.font = `${weight || 500} ${Math.round(size * S)}px 'JetBrains Mono', monospace`;
}

function drawRoundedRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// Price chart data
const chartPrices = [
  618, 640, 635, 670, 690, 685, 720, 710, 745, 760,
  755, 780, 800, 795, 830, 825, 860, 880, 870, 910
];

// ── PARTICLES ──
let particles = [];
function spawnDissolve(x, y, w, h, count, color) {
  for (let i = 0; i < count; i++) {
    const px = x + Math.random() * w;
    const py = y + Math.random() * h;
    const angle = Math.random() * Math.PI * 2;
    const speed = (30 + Math.random() * 80) * S;
    particles.push({
      x: px, y: py, color: color,
      vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - 40 * S,
      life: 0.6 + Math.random() * 0.8, maxLife: 0.6 + Math.random() * 0.8,
      size: 1.5 + Math.random() * 2
    });
  }
}
function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 60 * dt;
    p.life -= dt;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    const a = p.life / p.maxLife;
    ctx.globalAlpha = a;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * S, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ── PHASE 1: Polymarket Contract (0-3s) ──
function drawPhase1(t) {
  // Fade out at end
  const fadeOut = 1 - easeIn(clamp01((t - 2.5) / 0.5));
  const fadeIn = easeOut(clamp01(t / 0.6));
  const alpha = fadeIn * fadeOut;
  if (alpha <= 0) return;

  const cx = W / 2, cy = H / 2;

  ctx.globalAlpha = alpha;
  setFont(28, 600);
  ctx.fillStyle = WHITE;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('You use Polymarket.', cx, cy - 160 * S);

  // Contract card
  const cw = 420 * S, ch = 180 * S;
  const cardX = cx - cw / 2, cardY = cy - 60 * S;
  const cardSlide = easeOut(clamp01((t - 0.2) / 0.6));

  ctx.globalAlpha = alpha * cardSlide;
  ctx.fillStyle = CARD_BG;
  drawRoundedRect(cardX, cardY, cw, ch, 12 * S);
  ctx.fill();
  ctx.strokeStyle = DIM;
  ctx.lineWidth = 1.5 * S;
  drawRoundedRect(cardX, cardY, cw, ch, 12 * S);
  ctx.stroke();

  setFont(16, 600);
  ctx.fillStyle = WHITE;
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillText('Arsenal to win vs Chelsea', cardX + 20 * S, cardY + 30 * S);

  setMono(11, 400);
  ctx.fillStyle = DIM;
  ctx.textAlign = 'left';
  ctx.fillText('Premier League  |  Match Day 12', cardX + 20 * S, cardY + 55 * S);

  const btnW = 170 * S, btnH = 50 * S, btnY = cardY + 80 * S;

  // YES
  ctx.fillStyle = 'rgba(178,237,104,0.12)';
  drawRoundedRect(cardX + 20 * S, btnY, btnW, btnH, 8 * S); ctx.fill();
  ctx.strokeStyle = LIME; ctx.lineWidth = 1.5 * S;
  drawRoundedRect(cardX + 20 * S, btnY, btnW, btnH, 8 * S); ctx.stroke();
  setFont(14, 700); ctx.fillStyle = LIME; ctx.textAlign = 'center';
  ctx.fillText('YES', cardX + 20 * S + btnW/2, btnY + 18 * S);
  setMono(20, 700); ctx.fillStyle = LIME; ctx.textAlign = 'center';
  ctx.fillText('$0.62', cardX + 20 * S + btnW/2, btnY + 40 * S);

  // NO
  ctx.fillStyle = 'rgba(255,77,77,0.08)';
  const noX = cardX + 20*S + btnW + 20*S;
  drawRoundedRect(noX, btnY, btnW, btnH, 8 * S); ctx.fill();
  ctx.strokeStyle = '#553333'; ctx.lineWidth = 1.5 * S;
  drawRoundedRect(noX, btnY, btnW, btnH, 8 * S); ctx.stroke();
  setFont(14, 700); ctx.fillStyle = RED; ctx.textAlign = 'center';
  ctx.fillText('NO', noX + btnW/2, btnY + 18 * S);
  setMono(20, 700); ctx.fillStyle = RED; ctx.textAlign = 'center';
  ctx.fillText('$0.38', noX + btnW/2, btnY + 40 * S);

  // Shares
  const sharesA = easeOut(clamp01((t - 1.5) / 0.5));
  if (sharesA > 0) {
    ctx.globalAlpha = alpha * cardSlide * sharesA;
    setMono(12, 400); ctx.fillStyle = LIME; ctx.textAlign = 'left';
    ctx.fillText('Position: 100 shares YES @ $0.62', cardX + 20 * S, cardY + ch - 20 * S);
  }
  ctx.globalAlpha = 1;
}

// ── PHASE 2: Settlement (3-7s) ──
let dissolveTriggered = false;
function drawPhase2(t) {
  if (t < 3 || t > 7) return;
  const lt = t - 3;
  const fadeIn = easeOut(clamp01(lt / 0.4));
  const fadeOut = 1 - easeIn(clamp01((lt - 3.5) / 0.5));
  const alpha = fadeIn * fadeOut;
  if (alpha <= 0) return;

  const cx = W / 2, cy = H / 2;
  const cw = 420 * S, ch = 160 * S;
  const cardX = cx - cw / 2, cardY = cy - 50 * S;

  ctx.globalAlpha = alpha;

  // Header
  setFont(26, 600); ctx.fillStyle = WHITE;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('Match ends. Arsenal win.', cx, cy - 170 * S);

  // Settlement phase (0-1.8s)
  if (lt < 2.0) {
    const settleT = easeOut(clamp01(lt / 0.8));
    const yesPrice = lerp(0.62, 1.00, settleT);

    ctx.globalAlpha = alpha;
    ctx.fillStyle = CARD_BG;
    drawRoundedRect(cardX, cardY, cw, ch, 12 * S); ctx.fill();
    ctx.strokeStyle = settleT > 0.5 ? LIME : DIM; ctx.lineWidth = 1.5 * S;
    drawRoundedRect(cardX, cardY, cw, ch, 12 * S); ctx.stroke();

    setFont(16, 600); ctx.fillStyle = WHITE; ctx.textAlign = 'left';
    ctx.fillText('Arsenal to win vs Chelsea', cardX + 20 * S, cardY + 28 * S);

    if (settleT >= 0.95) {
      setMono(11, 600); ctx.fillStyle = LIME; ctx.textAlign = 'right';
      ctx.fillText('SETTLED', cardX + cw - 20 * S, cardY + 28 * S);
    }

    // Animated price
    setMono(36, 700); ctx.fillStyle = LIME; ctx.textAlign = 'center';
    ctx.fillText('$' + yesPrice.toFixed(2), cx, cardY + 75 * S);

    // Profit
    if (settleT > 0.7) {
      ctx.globalAlpha = alpha * easeOut(clamp01((settleT - 0.7) / 0.3));
      setMono(14, 600); ctx.fillStyle = LIME; ctx.textAlign = 'center';
      ctx.fillText('Profit: +$0.38/share', cx, cardY + 110 * S);

      if (lt > 1.0) {
        ctx.globalAlpha = alpha * easeOut(clamp01((lt - 1.0) / 0.3));
        setFont(20, 600); ctx.fillStyle = LIME;
        ctx.fillText('Nice.', cx, cardY + ch + 25 * S);
      }
    }
  }

  // Dissolve & "Position: GONE" (2.0-2.8s)
  if (lt >= 1.8 && lt < 3.0) {
    const dissolveT = clamp01((lt - 1.8) / 0.5);
    if (!dissolveTriggered && dissolveT > 0) {
      spawnDissolve(cardX, cardY, cw, ch, 40, DIM);
      dissolveTriggered = true;
    }
    ctx.globalAlpha = alpha * (1 - easeIn(dissolveT));
    ctx.fillStyle = CARD_BG;
    drawRoundedRect(cardX, cardY, cw, ch, 12 * S); ctx.fill();

    ctx.globalAlpha = alpha * easeOut(clamp01((lt - 2.2) / 0.3));
    setFont(22, 600); ctx.fillStyle = RED;
    ctx.textAlign = 'center';
    ctx.fillText('Contract closed. Position: GONE.', cx, cy - 10 * S);
  }

  // Cycle text (3.0-4.0s)
  if (lt >= 2.8) {
    ctx.globalAlpha = alpha * easeOut(clamp01((lt - 2.8) / 0.4));
    setFont(18, 500); ctx.fillStyle = WHITE; ctx.textAlign = 'center';
    ctx.fillText('Next match? Buy a NEW contract. New spread. New fees.', cx, cy + 30 * S);

    // Cycle arrows
    const arrowAlpha = easeOut(clamp01((lt - 3.0) / 0.6));
    const labels = ['BUY', 'SETTLE', 'BUY', 'SETTLE'];
    const colors = [CYAN, LIME, CYAN, LIME];
    const spacing = 100 * S;
    const startX = cx - 1.5 * spacing;
    for (let i = 0; i < 4; i++) {
      const showT = clamp01((arrowAlpha - i * 0.15) / 0.4);
      if (showT <= 0) continue;
      ctx.globalAlpha = alpha * easeOut(showT);
      const bx = startX + i * spacing;
      const by = cy + 80 * S;
      setMono(13, 700); ctx.fillStyle = colors[i]; ctx.textAlign = 'center';
      ctx.fillText(labels[i], bx, by);
      if (i < 3) {
        ctx.strokeStyle = DIM; ctx.lineWidth = 1.5 * S;
        ctx.beginPath();
        ctx.moveTo(bx + 28 * S, by); ctx.lineTo(bx + spacing - 28 * S, by);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(bx + spacing - 28 * S, by);
        ctx.lineTo(bx + spacing - 36 * S, by - 4 * S);
        ctx.lineTo(bx + spacing - 36 * S, by + 4 * S);
        ctx.closePath(); ctx.fillStyle = DIM; ctx.fill();
      }
    }
  }
  ctx.globalAlpha = 1;
}

// ── PHASE 3: 20 Contracts Grid (7-11s) ──
function drawPhase3(t) {
  if (t < 7 || t > 11) return;
  const lt = t - 7;
  const fadeIn = easeOut(clamp01(lt / 0.4));
  const fadeOut = 1 - easeIn(clamp01((lt - 3.5) / 0.5));
  const alpha = fadeIn * fadeOut;
  if (alpha <= 0) return;

  const cx = W / 2, cy = H / 2;

  ctx.globalAlpha = alpha;
  setFont(24, 600); ctx.fillStyle = WHITE;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('Every event is a NEW trade.', cx, cy - 205 * S);
  setFont(15, 400); ctx.fillStyle = DIM;
  ctx.fillText('You\'re re-entering constantly.', cx, cy - 175 * S);

  // Mini contract grid
  const cols = 5, rows = 4;
  const cardW = Math.min(125 * S, (W - 80) / cols - 6);
  const gap = 6 * S;
  const cardH = 44 * S;
  const gridW = cols * cardW + (cols - 1) * gap;
  const gridH = rows * cardH + (rows - 1) * gap;
  const gridX = cx - gridW / 2;
  const gridY = cy - gridH / 2 - 20 * S;

  // Seeded prices so they don't change per frame
  const prices = [0.62, 0.55, 0.71, 0.48, 0.66, 0.58, 0.73, 0.51, 0.64, 0.69,
                  0.57, 0.61, 0.75, 0.53, 0.67, 0.59, 0.72, 0.46, 0.63, 0.70];

  for (let i = 0; i < 20; i++) {
    const row = Math.floor(i / cols);
    const col = i % cols;
    const delay = i * 0.06;
    const showT = easeOut(clamp01((lt - 0.3 - delay) / 0.25));
    if (showT <= 0) continue;

    const mx = gridX + col * (cardW + gap);
    const my = gridY + row * (cardH + gap);

    ctx.globalAlpha = alpha * showT;

    ctx.fillStyle = CARD_BG;
    drawRoundedRect(mx, my, cardW, cardH, 5 * S); ctx.fill();
    ctx.strokeStyle = DIM; ctx.lineWidth = 0.8 * S;
    drawRoundedRect(mx, my, cardW, cardH, 5 * S); ctx.stroke();

    setMono(8, 400); ctx.fillStyle = '#555'; ctx.textAlign = 'left';
    ctx.fillText('GW ' + (i + 1), mx + 6 * S, my + 13 * S);

    setMono(12, 600); ctx.fillStyle = CYAN; ctx.textAlign = 'left';
    ctx.fillText('$' + prices[i].toFixed(2), mx + 6 * S, my + 30 * S);

    setMono(7, 400); ctx.fillStyle = RED; ctx.textAlign = 'right';
    ctx.fillText('-fee', mx + cardW - 6 * S, my + 30 * S);
  }

  // Summary
  if (lt > 2.0) {
    const sumAlpha = easeOut(clamp01((lt - 2.0) / 0.4));
    ctx.globalAlpha = alpha * sumAlpha;
    setFont(18, 600); ctx.fillStyle = RED; ctx.textAlign = 'center';
    ctx.fillText('20 entries. 20 exits. 20 spreads paid.', cx, gridY + gridH + 28 * S);

    // Fee bar
    const barW = 280 * S, barH = 7 * S;
    const barX = cx - barW / 2, barY = gridY + gridH + 50 * S;
    ctx.fillStyle = DIMMER;
    drawRoundedRect(barX, barY, barW, barH, 3 * S); ctx.fill();
    const fillT = easeOut(clamp01((lt - 2.3) / 0.7));
    ctx.fillStyle = RED;
    drawRoundedRect(barX, barY, barW * fillT, barH, 3 * S); ctx.fill();

    setMono(10, 400); ctx.fillStyle = '#555'; ctx.textAlign = 'center';
    ctx.fillText('cumulative fees over season', cx, barY + barH + 14 * S);
  }
  ctx.globalAlpha = 1;
}

// ── PHASE 4: Notch Continuous (11-15s) ──
function drawPhase4(t) {
  if (t < 11 || t > 15) return;
  const lt = t - 11;
  const fadeIn = easeOut(clamp01(lt / 0.4));
  const fadeOut = 1 - easeIn(clamp01((lt - 3.5) / 0.5));
  const alpha = fadeIn * fadeOut;
  if (alpha <= 0) return;

  const cx = W / 2, cy = H / 2;

  // Flash
  if (lt < 0.25) {
    ctx.globalAlpha = (1 - lt / 0.25) * 0.12;
    ctx.fillStyle = LIME;
    ctx.fillRect(0, 0, W, H);
  }

  ctx.globalAlpha = alpha;
  setFont(22, 600); ctx.fillStyle = LIME;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('On Notch: One position. Continuous exposure.', cx, cy - 215 * S);

  // Position card
  const cw = 340 * S, ch = 80 * S;
  const cardX = cx - cw / 2, cardY = cy - 190 * S;
  const cardFade = easeOut(clamp01((lt - 0.2) / 0.4));
  ctx.globalAlpha = alpha * cardFade;

  ctx.fillStyle = CARD_BG;
  drawRoundedRect(cardX, cardY, cw, ch, 10 * S); ctx.fill();
  ctx.strokeStyle = LIME; ctx.lineWidth = 1.5 * S;
  drawRoundedRect(cardX, cardY, cw, ch, 10 * S); ctx.stroke();

  setMono(11, 600); ctx.fillStyle = LIME; ctx.textAlign = 'left';
  ctx.fillText('LONG', cardX + 14 * S, cardY + 20 * S);
  setFont(17, 700); ctx.fillStyle = WHITE; ctx.textAlign = 'left';
  ctx.fillText('ARSENAL', cardX + 65 * S, cardY + 20 * S);
  setMono(12, 400); ctx.fillStyle = DIM; ctx.textAlign = 'right';
  ctx.fillText('Perpetual', cardX + cw - 14 * S, cardY + 20 * S);

  setMono(26, 700); ctx.fillStyle = WHITE; ctx.textAlign = 'left';
  ctx.fillText('$618', cardX + 14 * S, cardY + 52 * S);

  const pnlT = easeOut(clamp01((lt - 0.6) / 0.4));
  const pnlVal = Math.round(lerp(0, 292, pnlT));
  setMono(15, 600); ctx.fillStyle = LIME; ctx.textAlign = 'left';
  ctx.fillText('+$' + pnlVal + ' (+47.2%)', cardX + 120 * S, cardY + 52 * S);

  // Subtitle
  ctx.globalAlpha = alpha * easeOut(clamp01((lt - 0.5) / 0.3));
  setFont(13, 400); ctx.fillStyle = DIM; ctx.textAlign = 'center';
  ctx.fillText('Every match, every transfer, every event moves YOUR price.', cx, cardY + ch + 16 * S);

  // Chart
  const chartFade = easeOut(clamp01((lt - 0.8) / 0.5));
  ctx.globalAlpha = alpha * chartFade;

  const chartW = Math.min(620 * S, W - 60);
  const chartH = 170 * S;
  const chartX = cx - chartW / 2;
  const chartY = cy - 40 * S;

  ctx.fillStyle = '#0d0f15';
  drawRoundedRect(chartX, chartY, chartW, chartH, 8 * S); ctx.fill();

  // Grid
  ctx.strokeStyle = '#1a1d25'; ctx.lineWidth = 1 * S;
  for (let i = 1; i < 5; i++) {
    const gy = chartY + (chartH / 5) * i;
    ctx.beginPath(); ctx.moveTo(chartX + 10*S, gy); ctx.lineTo(chartX + chartW - 10*S, gy); ctx.stroke();
  }

  // Price line
  const lineProgress = easeInOut(clamp01((lt - 1.0) / 2.0));
  const pointCount = Math.max(2, Math.floor(lineProgress * 20));
  const minP = 590, maxP = 930;
  const padX = 25 * S, padY = 15 * S;
  const stepW = (chartW - 2 * padX) / 19;

  // Area fill
  const grad = ctx.createLinearGradient(0, chartY, 0, chartY + chartH);
  grad.addColorStop(0, 'rgba(178,237,104,0.15)');
  grad.addColorStop(1, 'rgba(178,237,104,0.0)');

  function priceY(p) { return chartY + chartH - padY - ((p - minP) / (maxP - minP)) * (chartH - 2 * padY); }

  ctx.beginPath();
  ctx.moveTo(chartX + padX, chartY + chartH - padY);
  for (let i = 0; i < pointCount; i++) {
    ctx.lineTo(chartX + padX + i * stepW, priceY(chartPrices[i]));
  }
  ctx.lineTo(chartX + padX + (pointCount - 1) * stepW, chartY + chartH - padY);
  ctx.closePath();
  ctx.fillStyle = grad; ctx.fill();

  // Line
  ctx.beginPath();
  ctx.moveTo(chartX + padX, priceY(chartPrices[0]));
  for (let i = 1; i < pointCount; i++) {
    ctx.lineTo(chartX + padX + i * stepW, priceY(chartPrices[i]));
  }
  ctx.strokeStyle = LIME; ctx.lineWidth = 2.5 * S; ctx.stroke();

  // Dot
  const lastI = pointCount - 1;
  const dotX = chartX + padX + lastI * stepW;
  const dotY = priceY(chartPrices[lastI]);
  ctx.beginPath(); ctx.arc(dotX, dotY, 5 * S, 0, Math.PI * 2); ctx.fillStyle = LIME; ctx.fill();
  ctx.beginPath(); ctx.arc(dotX, dotY, 8 * S, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(178,237,104,0.3)'; ctx.lineWidth = 2 * S; ctx.stroke();

  // Match markers at bottom
  for (let i = 0; i < pointCount; i++) {
    const mx = chartX + padX + i * stepW;
    ctx.fillStyle = 'rgba(34,211,238,0.5)';
    ctx.beginPath(); ctx.arc(mx, chartY + chartH - 6 * S, 2.5 * S, 0, Math.PI * 2); ctx.fill();
  }

  // Y-axis labels
  setMono(8, 400); ctx.fillStyle = '#444'; ctx.textAlign = 'right';
  for (let p = 600; p <= 900; p += 100) {
    ctx.fillText('$' + p, chartX + padX - 6 * S, priceY(p));
  }

  // "20 catalysts. 1 position."
  if (lt > 3.0) {
    ctx.globalAlpha = alpha * easeOut(clamp01((lt - 3.0) / 0.4));
    setFont(20, 700); ctx.fillStyle = LIME; ctx.textAlign = 'center';
    ctx.fillText('20 catalysts. 1 position.', cx, chartY + chartH + 30 * S);
  }
  ctx.globalAlpha = 1;
}

// ── PHASE 5: CTA (15-18s) ──
function drawPhase5(t) {
  if (t < 15) return;
  const lt = t - 15;
  const fadeIn = easeOut(clamp01(lt / 0.5));
  if (fadeIn <= 0) return;

  const cx = W / 2, cy = H / 2;

  ctx.globalAlpha = fadeIn;

  // Comparison columns
  const colW = Math.min(250 * S, (W / 2) - 50);
  const leftX = cx - colW - 20 * S;
  const rightX = cx + 20 * S;
  const topY = cy - 110 * S;
  const colH = 150 * S;

  // Polymarket
  ctx.fillStyle = '#0d0f15';
  drawRoundedRect(leftX, topY, colW, colH, 10 * S); ctx.fill();
  ctx.strokeStyle = DIM; ctx.lineWidth = 1 * S;
  drawRoundedRect(leftX, topY, colW, colH, 10 * S); ctx.stroke();

  setFont(15, 600); ctx.fillStyle = '#666'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('Polymarket', leftX + colW / 2, topY + 24 * S);

  const polyItems = ['Event-by-event', 'Binary: $1 or $0', 'Contract ends, start over', '20 entries per season'];
  setMono(10.5, 400); ctx.fillStyle = '#555'; ctx.textAlign = 'center';
  for (let i = 0; i < polyItems.length; i++) {
    ctx.fillText(polyItems[i], leftX + colW / 2, topY + 52 * S + i * 22 * S);
  }

  // Notch
  ctx.fillStyle = '#0a1510';
  drawRoundedRect(rightX, topY, colW, colH, 10 * S); ctx.fill();
  ctx.strokeStyle = LIME; ctx.lineWidth = 1.5 * S;
  drawRoundedRect(rightX, topY, colW, colH, 10 * S); ctx.stroke();

  setFont(15, 700); ctx.fillStyle = LIME; ctx.textAlign = 'center';
  ctx.fillText('Notch', rightX + colW / 2, topY + 24 * S);

  const notchItems = ['Team-forever', 'Continuous price exposure', 'One perpetual position', '1 entry, infinite catalysts'];
  setMono(10.5, 500); ctx.fillStyle = LIME; ctx.textAlign = 'center';
  for (let i = 0; i < notchItems.length; i++) {
    ctx.fillText(notchItems[i], rightX + colW / 2, topY + 52 * S + i * 22 * S);
  }

  // "vs"
  ctx.globalAlpha = fadeIn * 0.4;
  setFont(14, 400); ctx.fillStyle = DIM; ctx.textAlign = 'center';
  ctx.fillText('vs', cx, topY + colH / 2);

  // "The upgrade is here."
  ctx.globalAlpha = easeOut(clamp01((lt - 0.8) / 0.4));
  setFont(28, 700); ctx.fillStyle = WHITE; ctx.textAlign = 'center';
  ctx.fillText('The upgrade is here.', cx, topY + colH + 40 * S);

  // CTA button
  if (lt > 1.3) {
    const ctaAlpha = easeOut(clamp01((lt - 1.3) / 0.5));
    ctx.globalAlpha = ctaAlpha;

    const btnW = 220 * S, btnH = 54 * S;
    const btnX = cx - btnW / 2, btnY = topY + colH + 75 * S;

    ctx.shadowColor = LIME;
    ctx.shadowBlur = 20 * S;
    ctx.fillStyle = LIME;
    drawRoundedRect(btnX, btnY, btnW, btnH, 12 * S); ctx.fill();
    ctx.shadowBlur = 0;

    setFont(22, 700); ctx.fillStyle = '#0a0c10'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('notch.win', cx, btnY + btnH / 2);
  }
  ctx.globalAlpha = 1;
}

// ── PROGRESS BAR ──
function drawProgressBar(t) {
  const barH = 3 * S;
  ctx.fillStyle = DIMMER;
  ctx.fillRect(0, H - barH, W, barH);
  ctx.fillStyle = LIME;
  ctx.fillRect(0, H - barH, W * (t / DURATION), barH);
}

// ── MAIN LOOP ──
function draw(timestamp) {
  if (!startTime) startTime = timestamp;
  const dt = Math.min((timestamp - lastTimestamp) / 1000, 0.05);
  lastTimestamp = timestamp;

  if (running) {
    animTime = (timestamp - startTime) / 1000;
    if (animTime >= DURATION) {
      animTime = DURATION;
      running = false;
      watchBtn.classList.add('visible');
    }
  }

  ctx.fillStyle = BG;
  ctx.fillRect(0, 0, W, H);

  const t = animTime;

  updateParticles(dt);

  drawPhase1(t);
  drawPhase2(t);
  drawPhase3(t);
  drawPhase4(t);
  drawPhase5(t);

  drawProgressBar(t);

  requestAnimationFrame(draw);
}

function restart() {
  startTime = null;
  animTime = 0;
  running = true;
  dissolveTriggered = false;
  particles = [];
  lastTimestamp = 0;
  watchBtn.classList.remove('visible');
}

watchBtn.addEventListener('click', restart);
requestAnimationFrame(draw);
</script>
</body>
