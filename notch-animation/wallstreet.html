<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notch — The Sports Stock Market</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0c10;overflow:hidden;font-family:'Space Grotesk',sans-serif}
canvas{position:fixed;top:0;left:0;width:100%;height:100%}
#bar{position:fixed;bottom:0;left:0;height:3px;background:#b2ed68;z-index:10}
#again{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#b2ed68;color:#000;border:none;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:14px;padding:12px 28px;border-radius:99px;cursor:pointer;opacity:0;transition:opacity .6s;pointer-events:none;z-index:10}
#again.on{opacity:1;pointer-events:auto}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="bar"></div>
<button id="again" onclick="location.reload()">Watch again</button>
<script>
const C=document.getElementById('c'),X=C.getContext('2d'),bar=document.getElementById('bar'),btn=document.getElementById('again');
let W,H,cx,cy;
function resize(){const d=devicePixelRatio||1;W=innerWidth;H=innerHeight;cx=W/2;cy=H/2;C.width=W*d;C.height=H*d;X.scale(d,d)}
resize();addEventListener('resize',resize);

const eo=t=>1-Math.pow(1-t,3),ei=t=>t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2,
el=t=>t===0?0:t===1?1:Math.pow(2,-10*t)*Math.sin((t*10-.75)*2.094)+1,
eb=t=>{const n=7.5625,d=2.75;if(t<1/d)return n*t*t;if(t<2/d)return n*(t-=1.5/d)*t+.75;if(t<2.5/d)return n*(t-=2.25/d)*t+.9375;return n*(t-=2.625/d)*t+.984375};

const L='#b2ed68',R='#ff4d4d',WH='#fff',DM='#555',BD='#1c1e24',BG='#0a0c10';

// Teams as "stocks"
const STOCKS=[
  {tick:'ARS',name:'Arsenal FC',price:412,chg:+5.3,color:'#EF0107'},
  {tick:'BAR',name:'FC Barcelona',price:389,chg:+3.1,color:'#A50044'},
  {tick:'RMA',name:'Real Madrid CF',price:445,chg:+7.2,color:'#FEBE10'},
  {tick:'MCI',name:'Manchester City',price:378,chg:-2.1,color:'#6CABDD'},
  {tick:'BAY',name:'FC Bayern',price:401,chg:+4.6,color:'#DC052D'},
  {tick:'LIV',name:'Liverpool FC',price:367,chg:+1.8,color:'#C8102E'},
  {tick:'PSG',name:'Paris Saint-Germain',price:334,chg:-3.4,color:'#004170'},
  {tick:'JUV',name:'Juventus FC',price:298,chg:+2.9,color:'#ffffff'},
  {tick:'INT',name:'Inter Milan',price:312,chg:+6.1,color:'#009FE3'},
  {tick:'BVB',name:'Borussia Dortmund',price:287,chg:-1.2,color:'#FDE100'},
  {tick:'ATM',name:'Atlético Madrid',price:321,chg:+0.8,color:'#CB3524'},
  {tick:'CHE',name:'Chelsea FC',price:356,chg:+4.2,color:'#034694'},
];

let parts=[];
class P{constructor(x,y,c,vx,vy,l,sz){this.x=x;this.y=y;this.c=c;this.vx=vx;this.vy=vy;this.l=l;this.ml=l;this.s=sz||2}
update(){this.x+=this.vx;this.y+=this.vy;this.vy+=.01;this.l--}
draw(){const a=this.l/this.ml;X.globalAlpha=a;X.fillStyle=this.c;X.beginPath();X.arc(this.x,this.y,Math.max(0,this.s*a),0,Math.PI*2);X.fill();X.globalAlpha=1}}
function burst(x,y,c,n=50){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,sp=1+Math.random()*6;parts.push(new P(x,y,c,Math.cos(a)*sp,Math.sin(a)*sp-2,35+Math.random()*30,1.5+Math.random()*3))}}
function confetti(x,y,n=80){const cs=[L,'#60a5fa','#a78bfa','#f472b6','#fbbf24',WH];for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,sp=2+Math.random()*8;parts.push(new P(x,y,cs[i%cs.length],Math.cos(a)*sp,Math.sin(a)*sp-5,50+Math.random()*40,2+Math.random()*3))}}

function txt(t,x,y,{sz=40,c=WH,a=1,w='700',al='center',m=false}={}){X.globalAlpha=a;X.fillStyle=c;X.font=`${w} ${sz}px '${m?'JetBrains Mono':'Space Grotesk'}',sans-serif`;X.textAlign=al;X.textBaseline='middle';X.fillText(t,x,y);X.globalAlpha=1}
function rr(x,y,w,h,r,f,s,sw=1){X.beginPath();X.roundRect(x,y,w,h,r);if(f){X.fillStyle=f;X.fill()}if(s){X.strokeStyle=s;X.lineWidth=sw;X.stroke()}}
function glow(x,y,r,c){if(!isFinite(x)||!isFinite(y)||!isFinite(r)||r<=0)return;const g=X.createRadialGradient(x,y,0,x,y,r);g.addColorStop(0,c+'30');g.addColorStop(1,c+'00');X.fillStyle=g;X.fillRect(x-r,y-r,r*2,r*2)}

// scrolling ticker tape
function drawTicker(y,speed,alpha,time){
  X.globalAlpha=alpha;
  const totalW=STOCKS.length*220;
  const offset=-(time*speed)%totalW;
  for(let rep=-1;rep<3;rep++){
    STOCKS.forEach((s,i)=>{
      const sx=offset+rep*totalW+i*220;
      if(sx<-220||sx>W+220)return;
      const col=s.chg>=0?L:R;
      txt(s.tick,sx,y,{sz:14,c:s.color,m:true,w:'700',al:'left'});
      txt('$'+s.price,sx+50,y,{sz:14,c:WH,m:true,w:'500',al:'left'});
      txt((s.chg>=0?'+':'')+s.chg.toFixed(1)+'%',sx+110,y,{sz:12,c:col,m:true,w:'700',al:'left'});
    });
  }
  X.globalAlpha=1;
}

// mini sparkline
function miniLine(x,y,w,h,seed,prog,color){
  const pts=[];const rng=n=>{let s=seed+n*13.37;return(Math.sin(s*127.1)*43758.5453)%1};
  let val=.3;for(let i=0;i<30;i++){val+=rng(i)*.12-.05;val=Math.max(.05,Math.min(.95,val));pts.push(val)}
  const n=Math.floor(prog*pts.length);
  X.beginPath();
  for(let i=0;i<=n;i++){const px=x+(i/(pts.length-1))*w,py=y+h-pts[i]*h;if(i===0)X.moveTo(px,py);else X.lineTo(px,py)}
  X.strokeStyle=color;X.lineWidth=1.5;X.stroke();
}

const DUR=26000;
let t0=null,gT=0;
function gt(s,d){return Math.max(0,Math.min(1,(gT-s)/d))}

function render(ts){
  if(!t0)t0=ts;gT=ts-t0;
  bar.style.width=(Math.min(1,gT/DUR)*100)+'%';
  X.clearRect(0,0,W,H);X.fillStyle=BG;X.fillRect(0,0,W,H);
  parts=parts.filter(p=>p.l>0);parts.forEach(p=>{p.update();p.draw()});
  const s=Math.min(W,H)/900;

  // subtle grid always
  X.globalAlpha=.015;X.strokeStyle=WH;X.lineWidth=.5;
  for(let x=0;x<W;x+=50){X.beginPath();X.moveTo(x,0);X.lineTo(x,H);X.stroke()}
  for(let y=0;y<H;y+=50){X.beginPath();X.moveTo(0,y);X.lineTo(W,y);X.stroke()}
  X.globalAlpha=1;

  // ═══ 1: STOCK TICKERS RAIN IN (0–4.5s) ═══
  if(gT<5000){
    const t=gt(0,4000),fo=gT>4000?1-(gT-4000)/1000:1;

    // ticker tapes scrolling
    if(t>.1){
      const ta=eo(Math.min(1,(t-.1)/.3))*fo;
      drawTicker(80*s,.08,ta*.4,gT);
      drawTicker(H-80*s,.06,ta*.3,gT+5000);
      // secondary tickers
      drawTicker(140*s,.05,ta*.15,gT+2000);
      drawTicker(H-140*s,.07,ta*.15,gT+8000);
    }

    // stock cards falling in
    if(t>.15){
      const cardsToShow=Math.min(6,Math.floor((t-.15)/.08)+1);
      for(let i=0;i<cardsToShow;i++){
        const ct=Math.min(1,(t-.15-i*.08)/.15);
        const cardA=el(ct)*fo;
        const col=2,row=Math.floor(i/col);
        const cw=180*s,ch=70*s,gap=16*s;
        const totalCols=col,totalRows=3;
        const startX=cx-(totalCols*(cw+gap)-gap)/2;
        const startY=cy-80*s;
        const cardX=startX+(i%col)*(cw+gap);
        const cardY=startY+row*(ch+gap);
        const stk=STOCKS[i];

        X.globalAlpha=cardA;
        rr(cardX,cardY,cw,ch,8,'#10131a',BD);
        X.globalAlpha=1;

        // team color bar
        X.globalAlpha=cardA;X.fillStyle=stk.color;X.fillRect(cardX,cardY,4,ch);X.globalAlpha=1;

        txt(stk.tick,cardX+24,cardY+18,{sz:Math.round(16*s),c:stk.color,a:cardA,m:true,w:'700',al:'left'});
        txt('$'+stk.price,cardX+24,cardY+40,{sz:Math.round(18*s),c:WH,a:cardA,w:'600',al:'left'});
        const chgCol=stk.chg>=0?L:R;
        txt((stk.chg>=0?'▲':'▼')+Math.abs(stk.chg)+'%',cardX+24,cardY+58,{sz:Math.round(11*s),c:chgCol,a:cardA,m:true,w:'700',al:'left'});

        // sparkline
        X.globalAlpha=cardA;
        miniLine(cardX+cw-70*s,cardY+10,60*s,ch-20,i*7,Math.min(1,ct*3),stk.chg>=0?L:R);
        X.globalAlpha=1;
      }
    }

    // overlay text
    if(t>.5){
      const tta=eo((t-.5)/.3)*fo;
      // dark overlay
      X.globalAlpha=tta*.7;X.fillStyle=BG;X.fillRect(0,0,W,H);X.globalAlpha=1;
      txt('You can trade Apple.',cx,cy-20*s,{sz:Math.round(40*s),a:tta});
      if(t>.65){
        const t2=eo((t-.65)/.2);
        txt('You can trade Bitcoin.',cx,cy+25*s,{sz:Math.round(40*s),a:t2*fo});
      }
      if(t>.78){
        const t3=el((t-.78)/.2);
        txt('Why can\'t you trade Arsenal?',cx,cy+80*s,{sz:Math.round(40*s),c:L,a:t3*fo});
      }
    }
  }

  // ═══ 2: "NOW YOU CAN" + BOARD LIGHTS UP (4.5–10.5s) ═══
  if(gT>4500&&gT<11000){
    const t=gt(5000,5500),fi=eo(Math.min(1,t*4)),fo=t>.9?1-(t-.9)/.1:1,a=fi*fo;

    // "Now you can" flash
    if(t<.2){
      const fl=el(t/.2);
      txt('Now you can.',cx,cy,{sz:Math.round(64*s),c:L,a:fl});
      if(t>.01&&t<.04)burst(cx,cy,L,80);
    }

    // Full leaderboard / trading board
    if(t>.15){
      const boardA=eo(Math.min(1,(t-.15)/.2))*a;

      // Header bar
      const boardW=Math.min(600*s,W-40);
      const boardX=cx-boardW/2;
      const boardTop=cy-200*s;

      X.globalAlpha=boardA;
      rr(boardX,boardTop,boardW,36*s,8,'#12151c',L+'15');
      X.globalAlpha=1;
      txt('NOTCH — LIVE MARKETS',cx,boardTop+18*s,{sz:Math.round(11*s),c:L,a:boardA,m:true,w:'700'});

      // blinking dot
      const blink=Math.sin(gT*.005)>.0;
      if(blink){X.globalAlpha=boardA;X.fillStyle=L;X.beginPath();X.arc(boardX+16*s,boardTop+18*s,3*s,0,Math.PI*2);X.fill();X.globalAlpha=1}

      // Column headers
      const colY=boardTop+52*s;
      txt('TEAM',boardX+10*s,colY,{sz:Math.round(9*s),c:DM,a:boardA*.6,m:true,w:'500',al:'left'});
      txt('PRICE',boardX+boardW*.45,colY,{sz:Math.round(9*s),c:DM,a:boardA*.6,m:true,w:'500',al:'left'});
      txt('24H',boardX+boardW*.62,colY,{sz:Math.round(9*s),c:DM,a:boardA*.6,m:true,w:'500',al:'left'});
      txt('CHART',boardX+boardW*.78,colY,{sz:Math.round(9*s),c:DM,a:boardA*.6,m:true,w:'500',al:'left'});

      // Rows animate in
      const rowH=34*s;
      const maxRows=Math.min(10,STOCKS.length);
      for(let i=0;i<maxRows;i++){
        const rowDelay=.2+i*.04;
        if(t>rowDelay){
          const rt=eo(Math.min(1,(t-rowDelay)/.12));
          const ra=rt*boardA;
          const ry=colY+18*s+i*rowH;

          // row bg (alternating)
          X.globalAlpha=ra*.3;
          rr(boardX+4,ry-rowH/2+4,boardW-8,rowH-4,4,i%2===0?'#0e1016':'transparent');
          X.globalAlpha=1;

          const stk=STOCKS[i];
          // color dot
          X.globalAlpha=ra;X.fillStyle=stk.color;X.beginPath();X.arc(boardX+16*s,ry,5*s,0,Math.PI*2);X.fill();X.globalAlpha=1;

          txt(stk.tick,boardX+28*s,ry,{sz:Math.round(13*s),c:WH,a:ra,m:true,w:'700',al:'left'});
          txt(stk.name,boardX+75*s,ry,{sz:Math.round(10*s),c:DM,a:ra*.6,w:'400',al:'left'});

          // price with subtle flicker
          const priceFlicker=1+Math.sin(gT*.003+i*2)*.008;
          txt('$'+(stk.price*priceFlicker).toFixed(0),boardX+boardW*.45,ry,{sz:Math.round(13*s),c:WH,a:ra,m:true,w:'500',al:'left'});

          // change
          const chgCol=stk.chg>=0?L:R;
          const arrow=stk.chg>=0?'▲':'▼';
          txt(arrow+Math.abs(stk.chg).toFixed(1)+'%',boardX+boardW*.62,ry,{sz:Math.round(11*s),c:chgCol,a:ra,m:true,w:'700',al:'left'});

          // mini sparkline
          X.globalAlpha=ra;
          miniLine(boardX+boardW*.78,ry-8*s,boardW*.18,16*s,i*11,Math.min(1,(t-rowDelay)/.3),stk.chg>=0?L:R);
          X.globalAlpha=1;

          // random sparkle on positive rows
          if(stk.chg>3&&Math.random()<.01)parts.push(new P(boardX+boardW*.85,ry,L,(Math.random()-.5)*2,-Math.random()*1.5,20,1.5));
        }
      }

      // Volume bar at bottom
      if(t>.6){
        const vt=eo((t-.6)/.2);
        const vy=colY+18*s+maxRows*rowH+20*s;
        X.globalAlpha=vt*boardA;
        rr(boardX,vy,boardW,30*s,6,'#0e1016',BD);
        X.globalAlpha=1;
        txt('24H VOLUME',boardX+14*s,vy+15*s,{sz:Math.round(9*s),c:DM,a:vt*boardA,m:true,w:'500',al:'left'});
        txt('$14.2M',boardX+boardW-14*s,vy+15*s,{sz:Math.round(14*s),c:L,a:vt*boardA,m:true,w:'700',al:'right'});

        // volume bars
        for(let i=0;i<20;i++){
          const bh=(Math.sin(i*.7+gT*.002)*0.3+0.5)*20*s;
          X.globalAlpha=vt*boardA*.4;X.fillStyle=L;
          X.fillRect(boardX+boardW*.35+i*8*s,vy+25*s-bh,5*s,bh);
        }
        X.globalAlpha=1;
      }
    }
  }

  // ═══ 3: ZOOM INTO ONE TRADE — STORY (10.5–17.5s) ═══
  if(gT>10500&&gT<18000){
    const t=gt(11000,6500),fi=eo(Math.min(1,t*4)),fo=t>.9?1-(t-.9)/.1:1,a=fi*fo;

    // "Let's say you believe in Arsenal"
    if(t<.15){
      const h=el(t/.15)*a;
      txt('Let\'s say you believe in Arsenal.',cx,cy,{sz:Math.round(32*s),c:WH,a:h});
    }

    // Trade opens
    if(t>.12){
      // big price chart
      const chartW=Math.min(550*s,W-60),chartH=220*s;
      const chartX=cx-chartW/2,chartY=cy-60*s;

      // chart bg
      X.globalAlpha=a*.8;
      rr(chartX-20,chartY-60*s,chartW+40,chartH+110*s,12,'#0c0f16',BD);
      X.globalAlpha=1;

      // header
      X.globalAlpha=a;X.fillStyle='#EF0107';X.beginPath();X.arc(chartX+6,chartY-35*s,8*s,0,Math.PI*2);X.fill();X.globalAlpha=1;
      txt('ARS',chartX+6,chartY-35*s,{sz:Math.round(7*s),c:'#000',a,m:true,w:'700'});
      txt('Arsenal FC',chartX+24*s,chartY-38*s,{sz:Math.round(16*s),c:WH,a,w:'600',al:'left'});

      // price stages along the narrative
      const stages=[
        {at:.12,price:340,label:'You open long @ $340'},{at:.22,price:348,label:'Win vs Chelsea → $348'},
        {at:.32,price:358,label:'UCL qualification → $358'},{at:.40,price:351,label:'Saka injured → dip to $351'},
        {at:.50,price:365,label:'Recovery → $365'},{at:.60,price:382,label:'4-match win streak → $382'},
        {at:.70,price:395,label:'Transfer window boost → $395'},{at:.80,price:412,label:'Title contender → $412'}
      ];
      let cur=stages[0];for(const st of stages)if(t>=st.at)cur=st;

      // live price
      txt('$'+cur.price,chartX+chartW-10,chartY-38*s,{sz:Math.round(22*s),c:WH,a,m:true,w:'700',al:'right'});
      const pnl=((cur.price-340)/340*100).toFixed(1);
      txt('+'+pnl+'%',chartX+chartW-10,chartY-14*s,{sz:Math.round(14*s),c:L,a,m:true,w:'700',al:'right'});

      // draw the price line
      const allPts=[.0,.02,.04,.06,.10,.14,.12,.16,.20,.18,.22,.26,.30,.28,.26,.30,.34,.38,.36,.40,.44,.42,.46,.50,.54,.52,.50,.54,.58,.62,.60,.58,.62,.66,.70,.68,.72,.76,.74,.78,.82,.80,.84,.88,.86,.90,.94,.92,.96,1.0];
      const chartProg=ei(Math.min(1,(t-.12)/.7));
      const n=Math.floor(chartProg*allPts.length);

      // grid lines
      X.globalAlpha=a*.1;X.strokeStyle=WH;X.lineWidth=.5;
      for(let i=0;i<5;i++){const gy=chartY+i*(chartH/4);X.beginPath();X.moveTo(chartX,gy);X.lineTo(chartX+chartW,gy);X.stroke()}
      X.globalAlpha=1;

      // price line
      X.beginPath();
      for(let i=0;i<=n;i++){
        const px=chartX+(i/allPts.length)*chartW;
        const py=chartY+chartH-allPts[i]*chartH;
        if(i===0)X.moveTo(px,py);else X.lineTo(px,py);
      }
      X.strokeStyle=L;X.lineWidth=2.5;X.globalAlpha=a;X.stroke();
      // gradient fill
      if(n>0){
        const lastX=chartX+(n/allPts.length)*chartW;
        X.lineTo(lastX,chartY+chartH);X.lineTo(chartX,chartY+chartH);X.closePath();
        const grad=X.createLinearGradient(0,chartY,0,chartY+chartH);
        grad.addColorStop(0,L+'20');grad.addColorStop(1,L+'00');
        X.fillStyle=grad;X.fill();
        // glowing dot
        const dy=chartY+chartH-allPts[n]*chartH;
        glow(lastX,dy,25,L);
        X.fillStyle=L;X.beginPath();X.arc(lastX,dy,4,0,Math.PI*2);X.fill();
      }
      X.globalAlpha=1;

      // narrative labels
      stages.forEach(st=>{
        if(t>st.at&&t<st.at+.08){
          const et=(t-st.at)/.08;
          const ea=et<.15?et/.15:et>.7?(1-et)/.3:1;
          txt(st.label,cx,chartY+chartH+30*s,{sz:Math.round(14*s),c:L,a:ea*a,w:'500'});
          if(et<.03)burst(cx,chartY+chartH+30*s,L,20);
        }
      });

      // Time axis labels
      const months=['Aug','Sep','Oct','Nov','Dec','Jan','Feb','Mar'];
      months.forEach((m,i)=>{
        const mx=chartX+(i/(months.length-1))*chartW;
        txt(m,mx,chartY+chartH+12*s,{sz:Math.round(8*s),c:DM,a:a*.5,m:true,w:'400'});
      });
    }
  }

  // ═══ 4: THE PUNCHLINE — COMPARISON (17.5–22.5s) ═══
  if(gT>17000&&gT<23000){
    const t=gt(17500,5000),fi=eo(Math.min(1,t*4)),fo=t>.88?1-(t-.88)/.12:1,a=fi*fo;

    // "With a sportsbook, that story ends at full time."
    if(t<.25){
      const h=el(Math.min(1,t/.15))*a;
      txt('With a sportsbook,',cx,cy-25*s,{sz:Math.round(28*s),c:'#888',a:h,w:'500'});
      txt('that story ends at full time.',cx,cy+15*s,{sz:Math.round(28*s),c:R,a:h,w:'600'});
    }

    // Split comparison
    if(t>.2){
      const compA=eo(Math.min(1,(t-.2)/.2))*a;
      const midX=cx,topY=cy-120*s;
      const colW=220*s;

      // Sportsbook side
      if(t>.25){
        const lt=el(Math.min(1,(t-.25)/.15));
        const la=lt*compA;
        const lx=midX-30*s-colW;

        X.globalAlpha=la;rr(lx,topY,colW,260*s,12,'#0e0f14',R+'20');X.globalAlpha=1;
        txt('Sportsbook',lx+colW/2,topY+24*s,{sz:Math.round(16*s),c:R,a:la,w:'600'});

        const items=[
          {icon:'⏱',text:'90 min then dead'},{icon:'🎲',text:'Win or lose, nothing else'},
          {icon:'💸',text:'~7% house edge'},{icon:'🔒',text:'Can\'t sell early'},
          {icon:'😴',text:'Off-season? See you later'},{icon:'☠️',text:'Start over every match'}
        ];
        items.forEach((it,i)=>{
          const id=.3+i*.05;
          if(t>id){
            const ia=eo(Math.min(1,(t-id)/.1))*compA;
            const iy=topY+55*s+i*34*s;
            txt(it.icon,lx+20*s,iy,{sz:Math.round(14*s),a:ia,al:'left'});
            txt(it.text,lx+42*s,iy,{sz:Math.round(12*s),c:'#777',a:ia,w:'400',al:'left'});
          }
        });
      }

      // Notch side
      if(t>.3){
        const rt=el(Math.min(1,(t-.3)/.15));
        const ra=rt*compA;
        const rx=midX+30*s;

        X.globalAlpha=ra;rr(rx,topY,colW,260*s,12,'#0d1210',L+'20');X.globalAlpha=1;
        glow(rx+colW/2,topY+130*s,200,L);
        txt('Notch',rx+colW/2,topY+24*s,{sz:Math.round(16*s),c:L,a:ra,w:'600'});

        const items=[
          {icon:'♾️',text:'Hold forever'},{icon:'📈',text:'Long, short, partial close'},
          {icon:'💚',text:'0% house edge'},{icon:'🔓',text:'Exit anytime'},
          {icon:'🔥',text:'Transfers move your price'},{icon:'🚀',text:'Compound all season'}
        ];
        items.forEach((it,i)=>{
          const id=.35+i*.05;
          if(t>id){
            const ia=eo(Math.min(1,(t-id)/.1))*compA;
            const iy=topY+55*s+i*34*s;
            txt(it.icon,rx+20*s,iy,{sz:Math.round(14*s),a:ia,al:'left'});
            txt(it.text,rx+42*s,iy,{sz:Math.round(12*s),c:L,a:ia,w:'500',al:'left'});
          }
        });
      }
    }
  }

  // ═══ 5: FINALE (22.5–26s) ═══
  if(gT>22000){
    const t=gt(22500,3500);

    // ticker still running in background faintly
    drawTicker(40*s,.04,.06,gT);
    drawTicker(H-40*s,.05,.06,gT+3000);

    if(t>.0){
      const t1=el(Math.min(1,t/.2));
      txt('Every team.',cx,cy-80*s,{sz:Math.round(52*s),a:t1,w:'700'});
    }
    if(t>.08){
      const t2=el(Math.min(1,(t-.08)/.2));
      txt('A live price.',cx,cy-25*s,{sz:Math.round(52*s),c:L,a:t2,w:'700'});
    }
    if(t>.18){
      const t3=el(Math.min(1,(t-.18)/.2));
      txt('Trade it like a stock.',cx,cy+35*s,{sz:Math.round(52*s),a:t3,w:'700'});
      if(t>.19&&t<.22)confetti(cx,cy+35*s,90);
    }

    // CTA
    if(t>.45){
      const ct=eo((t-.45)/.12);
      const ctaY=cy+120*s;
      glow(cx,ctaY,120,L);
      X.globalAlpha=ct;rr(cx-110*s,ctaY-24*s,220*s,48*s,99,L);X.globalAlpha=1;
      txt('Join the waitlist',cx,ctaY,{sz:Math.round(16*s),c:'#000',a:ct,w:'700'});
      if(Math.random()<.15)parts.push(new P(cx+(Math.random()-.5)*240*s,ctaY,L,(Math.random()-.5)*1,-Math.random()*2,18,1.5));
    }
    if(t>.5)txt('notch.win',cx,cy+165*s,{sz:Math.round(13*s),c:L,a:eo((t-.5)/.1)*.5,m:true,w:'500'});

    if(t>=1)btn.classList.add('on');
  }

  if(gT<DUR+3000)requestAnimationFrame(render);
}
requestAnimationFrame(render);
</script>
