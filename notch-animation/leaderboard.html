<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notch — Leaderboard Race</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0c10;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Space Grotesk', sans-serif;
  }
  canvas { display: block; }
  #watchAgain {
    position: fixed;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    padding: 14px 36px;
    background: #b2ed68;
    color: #0a0c10;
    border: none;
    border-radius: 8px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    display: none;
    z-index: 10;
    letter-spacing: 0.5px;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  #watchAgain:hover {
    transform: translateX(-50%) scale(1.05);
    box-shadow: 0 0 30px rgba(178,237,104,0.4);
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<button id="watchAgain" onclick="restart()">Watch Again</button>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const btn = document.getElementById('watchAgain');

// --- RESPONSIVE ---
let W, H, S;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  S = Math.min(W / 1080, H / 1920) * (W > H ? 1.1 : 1);
}
resize();
window.addEventListener('resize', resize);

// --- COLORS ---
const BG = '#0a0c10';
const LIME = '#b2ed68';
const GOLD = '#fbbf24';
const RED = '#ff4d4d';
const WHITE = '#ffffff';
const DIM = '#8892a4';
const CARD_BG = '#12151c';
const CARD_BORDER = '#1e2230';
const HIGHLIGHT_BG = '#161e12';

// --- EASING ---
function easeOutElastic(t) {
  if (t === 0 || t === 1) return t;
  return Math.pow(2, -10 * t) * Math.sin((t - 0.075) * (2 * Math.PI) / 0.3) + 1;
}
function easeOutBounce(t) {
  if (t < 1/2.75) return 7.5625*t*t;
  if (t < 2/2.75) return 7.5625*(t-=1.5/2.75)*t+0.75;
  if (t < 2.5/2.75) return 7.5625*(t-=2.25/2.75)*t+0.9375;
  return 7.5625*(t-=2.625/2.75)*t+0.984375;
}
function easeOutCubic(t) { return 1 - Math.pow(1-t, 3); }
function easeInOutCubic(t) { return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3)/2; }
function easeInQuad(t) { return t*t; }
function easeOutQuint(t) { return 1 - Math.pow(1-t, 5); }
function lerp(a, b, t) { return a + (b - a) * Math.max(0, Math.min(1, t)); }
function clamp01(t) { return Math.max(0, Math.min(1, t)); }

// --- PARTICLES ---
let particles = [];
function spawnParticles(x, y, count, color, speed, life) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const v = (Math.random() * 0.6 + 0.4) * speed;
    particles.push({
      x, y,
      vx: Math.cos(angle) * v,
      vy: Math.sin(angle) * v,
      life: life || 1.5,
      maxLife: life || 1.5,
      size: (Math.random() * 3 + 1.5) * S,
      color,
      gravity: 0.15
    });
  }
}

// --- CONFETTI ---
let confetti = [];
function spawnConfetti(cx, cy, count) {
  const colors = [LIME, GOLD, '#ff6b9d', '#6bc5ff', WHITE, RED];
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const v = Math.random() * 8 + 3;
    confetti.push({
      x: cx, y: cy,
      vx: Math.cos(angle) * v,
      vy: Math.sin(angle) * v - 4,
      rotation: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.3,
      w: (Math.random() * 8 + 4) * S,
      h: (Math.random() * 4 + 2) * S,
      color: colors[Math.floor(Math.random() * colors.length)],
      life: 3 + Math.random() * 2,
      maxLife: 5,
      gravity: 0.12
    });
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += p.gravity;
    p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
  for (let i = confetti.length - 1; i >= 0; i--) {
    const c = confetti[i];
    c.x += c.vx;
    c.y += c.vy;
    c.vy += c.gravity;
    c.vx *= 0.99;
    c.rotation += c.rotSpeed;
    c.life -= dt;
    if (c.life <= 0) confetti.splice(i, 1);
  }
}

function drawParticles() {
  for (const p of particles) {
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  }
  for (const c of confetti) {
    const alpha = Math.min(1, c.life / (c.maxLife * 0.3));
    ctx.globalAlpha = alpha;
    ctx.save();
    ctx.translate(c.x, c.y);
    ctx.rotate(c.rotation);
    ctx.fillStyle = c.color;
    ctx.fillRect(-c.w/2, -c.h/2, c.w, c.h);
    ctx.restore();
  }
  ctx.globalAlpha = 1;
}

// --- BACKGROUND STARS ---
let stars = [];
function initStars() {
  stars = [];
  for (let i = 0; i < 80; i++) {
    stars.push({
      x: Math.random() * 1920,
      y: Math.random() * 1920,
      size: Math.random() * 1.5 + 0.3,
      speed: Math.random() * 0.4 + 0.1,
      phase: Math.random() * Math.PI * 2
    });
  }
}
initStars();

function drawStars(t) {
  for (const s of stars) {
    const sx = (s.x / 1920) * W;
    const sy = (s.y / 1920) * H;
    const alpha = 0.2 + 0.3 * Math.sin(t * s.speed * 2 + s.phase);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = WHITE;
    ctx.beginPath();
    ctx.arc(sx, sy, s.size * S, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// --- LEADERBOARD DATA ---
const FULL_BOARD = [
  { rank: 1, name: 'CryptoKing', pnl: 4200, badge: '\u{1F451}' },
  { rank: 2, name: 'GoalMachine', pnl: 3800, badge: '\u{1F3C6}' },
  { rank: 3, name: 'ArsenalFanatic', pnl: 3100, badge: '\u{1F947}' },
  { rank: 4, name: 'TraderJoe99', pnl: 2900, badge: '\u{1F948}' },
  { rank: 5, name: 'PremBets', pnl: 2600, badge: '\u{1F949}' },
  { rank: 6, name: 'xGoalKing', pnl: 2340, badge: '' },
  { rank: 7, name: 'FPL_Legend', pnl: 2100, badge: '' },
  { rank: 8, name: 'PitchTrader', pnl: 1870, badge: '' },
];

const YOU_NAME = 'You';
const YOU_INITIAL_PNL = 420;
const YOU_INITIAL_RANK = 47;

// --- TIMELINE ---
const TOTAL_DURATION = 30;
let time = 0;
let started = false;
let finished = false;

// --- DRAWING HELPERS ---
function setFont(size, weight, family) {
  ctx.font = `${weight || '600'} ${size * S}px '${family || 'Space Grotesk'}', sans-serif`;
}

function drawTextGlow(text, x, y, color, glowRadius) {
  ctx.shadowColor = color;
  ctx.shadowBlur = glowRadius * S;
  ctx.fillText(text, x, y);
  ctx.fillText(text, x, y);
  ctx.shadowBlur = 0;
}

function drawProgressBar(progress) {
  const barH = 4 * S;
  const y = H - barH;
  ctx.fillStyle = '#1a1d28';
  ctx.fillRect(0, y, W, barH);
  const gradient = ctx.createLinearGradient(0, y, W * progress, y);
  gradient.addColorStop(0, LIME);
  gradient.addColorStop(1, GOLD);
  ctx.fillStyle = gradient;
  ctx.fillRect(0, y, W * progress, barH);
}

function drawRoundedRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// --- LEADERBOARD ROW ---
function drawRow(x, y, w, h, rank, name, pnl, badge, isYou, highlight, alpha) {
  ctx.globalAlpha = alpha;
  const bg = isYou ? HIGHLIGHT_BG : CARD_BG;
  const border = isYou ? LIME : CARD_BORDER;

  drawRoundedRect(x, y, w, h, 8 * S);
  ctx.fillStyle = bg;
  ctx.fill();
  ctx.strokeStyle = border;
  ctx.lineWidth = (isYou ? 2 : 1) * S;
  ctx.stroke();

  if (isYou && highlight) {
    ctx.shadowColor = LIME;
    ctx.shadowBlur = 20 * S;
    drawRoundedRect(x, y, w, h, 8 * S);
    ctx.strokeStyle = LIME;
    ctx.lineWidth = 2 * S;
    ctx.stroke();
    ctx.shadowBlur = 0;
  }

  const cy = y + h / 2;
  const pad = 16 * S;

  // Rank
  setFont(18, '700', 'JetBrains Mono');
  ctx.fillStyle = rank <= 3 ? GOLD : DIM;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(`#${rank}`, x + pad + 18 * S, cy);

  // Badge
  if (badge) {
    setFont(20, '400');
    ctx.fillText(badge, x + pad + 50 * S, cy);
  }

  // Name
  setFont(16, '600');
  ctx.fillStyle = isYou ? LIME : WHITE;
  ctx.textAlign = 'left';
  ctx.fillText(name, x + pad + 72 * S, cy);

  // PnL
  setFont(15, '700', 'JetBrains Mono');
  ctx.fillStyle = pnl >= 0 ? LIME : RED;
  ctx.textAlign = 'right';
  ctx.fillText(`$${pnl.toLocaleString()}`, x + w - pad, cy);

  ctx.globalAlpha = 1;
  ctx.textAlign = 'left';
}

// --- PHASE RENDERERS ---

function renderPhase1(t) {
  // 0-4s: SEASON 1 + $10,000 PRIZE POOL
  const cx = W / 2;
  const cy = H / 2;

  // Trophy entrance
  const trophyT = clamp01(t / 1.2);
  const trophyScale = easeOutElastic(trophyT);
  const trophyAlpha = easeOutCubic(clamp01(t / 0.6));

  ctx.globalAlpha = trophyAlpha;
  ctx.save();
  ctx.translate(cx, cy - 60 * S);
  ctx.scale(trophyScale, trophyScale);
  setFont(72, '400');
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('\u{1F3C6}', 0, 0);
  ctx.restore();

  // SEASON 1 text
  const textT = clamp01((t - 0.5) / 1.0);
  const textAlpha = easeOutCubic(textT);
  const textScale = easeOutElastic(clamp01((t - 0.5) / 1.5));

  ctx.globalAlpha = textAlpha;
  ctx.save();
  ctx.translate(cx, cy + 30 * S);
  ctx.scale(textScale, textScale);
  setFont(48, '700');
  ctx.fillStyle = WHITE;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  drawTextGlow('SEASON 1', 0, 0, LIME, 15);
  ctx.restore();

  // Prize pool
  const prizeT = clamp01((t - 1.5) / 1.0);
  const prizeAlpha = easeOutCubic(prizeT);
  ctx.globalAlpha = prizeAlpha;
  setFont(28, '700');
  ctx.fillStyle = GOLD;
  ctx.textAlign = 'center';
  drawTextGlow('$10,000 PRIZE POOL', cx, cy + 90 * S, GOLD, 20);

  // Subtitle
  const subT = clamp01((t - 2.5) / 1.0);
  ctx.globalAlpha = easeOutCubic(subT);
  setFont(16, '500');
  ctx.fillStyle = DIM;
  ctx.fillText('Compete. Trade. Win.', cx, cy + 130 * S);

  // Sparkle particles
  if (t > 1.0 && t < 1.1) {
    spawnParticles(cx, cy - 60 * S, 25, GOLD, 4, 2);
  }

  // Fade out
  if (t > 3.2) {
    const fadeOut = 1 - clamp01((t - 3.2) / 0.8);
    ctx.globalAlpha = fadeOut;
    ctx.fillStyle = BG;
    ctx.globalAlpha = 1 - fadeOut;
  }

  ctx.globalAlpha = 1;
  ctx.textAlign = 'left';
}

function renderPhase2(t) {
  // 4-9s: Leaderboard builds
  const localT = t - 4;
  const cx = W / 2;
  const rowW = Math.min(500 * S, W * 0.9);
  const rowH = 52 * S;
  const gap = 8 * S;
  const startY = H * 0.08;

  // Title
  const titleT = clamp01(localT / 0.8);
  ctx.globalAlpha = easeOutCubic(titleT);
  setFont(24, '700');
  ctx.fillStyle = WHITE;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('LEADERBOARD', cx, startY);
  ctx.globalAlpha = 1;

  // Rows appear one by one
  const entries = FULL_BOARD.slice();
  const totalVisible = Math.min(entries.length, Math.floor(localT / 0.45) + 1);

  for (let i = 0; i < totalVisible && i < entries.length; i++) {
    const entryT = clamp01((localT - i * 0.45) / 0.6);
    const bounce = easeOutElastic(entryT);
    const alpha = easeOutCubic(clamp01((localT - i * 0.45) / 0.3));
    const rowX = cx - rowW / 2;
    const rowY = startY + 30 * S + i * (rowH + gap);
    const offsetX = (1 - bounce) * 100 * S;

    const e = entries[i];
    drawRow(rowX + offsetX, rowY, rowW, rowH, e.rank, e.name, e.pnl, e.badge, false, false, alpha);
  }

  // You row appears after others
  const youDelay = entries.length * 0.45 + 0.3;
  if (localT > youDelay) {
    const youT = clamp01((localT - youDelay) / 0.8);
    const youBounce = easeOutElastic(youT);
    const youAlpha = easeOutCubic(clamp01((localT - youDelay) / 0.4));
    const youY = startY + 30 * S + entries.length * (rowH + gap) + 20 * S;
    const rowX = cx - rowW / 2;

    // Ellipsis indicator
    ctx.globalAlpha = youAlpha;
    setFont(20, '600');
    ctx.fillStyle = DIM;
    ctx.textAlign = 'center';
    ctx.fillText('...', cx, youY - 10 * S);

    const youOffsetX = (1 - youBounce) * 120 * S;
    drawRow(rowX + youOffsetX, youY + 5 * S, rowW, rowH, YOU_INITIAL_RANK, YOU_NAME, YOU_INITIAL_PNL, '', true, true, youAlpha);
  }

  ctx.globalAlpha = 1;
  ctx.textAlign = 'left';
}

function renderPhase3(t) {
  // 9-14s: Climbing the leaderboard
  const localT = t - 9;
  const cx = W / 2;
  const rowW = Math.min(500 * S, W * 0.9);
  const rowH = 52 * S;
  const gap = 8 * S;
  const startY = H * 0.08;

  // "3 months later..." text
  const fadeInText = clamp01(localT / 0.8);
  const fadeOutText = 1 - clamp01((localT - 1.5) / 0.5);
  const textAlpha = Math.min(fadeInText, fadeOutText);

  if (localT < 2.0) {
    ctx.globalAlpha = textAlpha;
    setFont(22, '600');
    ctx.fillStyle = DIM;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('3 months later...', cx, H / 2);
    ctx.globalAlpha = 1;
    ctx.textAlign = 'left';
    return;
  }

  // Climbing animation
  const climbT = localT - 2.0; // 0 to 3
  const climbStages = [
    { rank: 47, pnl: 420, time: 0 },
    { rank: 32, pnl: 1250, time: 0.6 },
    { rank: 18, pnl: 2100, time: 1.3 },
    { rank: 8, pnl: 3050, time: 2.0 },
  ];

  // Determine current stage
  let currentRank = 47;
  let currentPnl = 420;
  for (let i = 0; i < climbStages.length - 1; i++) {
    const s1 = climbStages[i];
    const s2 = climbStages[i + 1];
    if (climbT >= s1.time && climbT < s2.time) {
      const p = easeInOutCubic(clamp01((climbT - s1.time) / (s2.time - s1.time)));
      currentRank = Math.round(lerp(s1.rank, s2.rank, p));
      currentPnl = Math.round(lerp(s1.pnl, s2.pnl, p));
    } else if (climbT >= s2.time) {
      currentRank = s2.rank;
      currentPnl = s2.pnl;
    }
  }

  // Title
  ctx.globalAlpha = 1;
  setFont(24, '700');
  ctx.fillStyle = WHITE;
  ctx.textAlign = 'center';
  ctx.fillText('LEADERBOARD', cx, startY);

  // Show condensed board with your position
  const nearbyRanks = [];
  for (let r = Math.max(1, currentRank - 2); r <= Math.min(currentRank + 2, 50); r++) {
    if (r === currentRank) {
      nearbyRanks.push({ rank: r, name: YOU_NAME, pnl: currentPnl, badge: r <= 3 ? '\u{1F947}' : '', isYou: true });
    } else {
      const otherPnl = Math.max(100, 4200 - r * 80 + Math.sin(r * 3) * 200);
      const names = ['CryptoKing','GoalMachine','ArsenalFanatic','TraderJoe99','PremBets','xGoalKing','FPL_Legend','PitchTrader','AlphaStrike','WengerIn','LFC_Bull','BlueMoon','SouthgateFan'];
      nearbyRanks.push({ rank: r, name: names[r % names.length], pnl: Math.round(otherPnl), badge: r <= 3 ? ['\u{1F451}','\u{1F3C6}','\u{1F947}'][r-1] : '', isYou: false });
    }
  }

  // Top 3 always visible
  const top3 = FULL_BOARD.slice(0, 3).map(e => ({...e, isYou: false}));
  if (currentRank > 5) {
    for (let i = 0; i < top3.length; i++) {
      const rowX = cx - rowW / 2;
      const rowY = startY + 30 * S + i * (rowH + gap);
      drawRow(rowX, rowY, rowW, rowH, top3[i].rank, top3[i].name, top3[i].pnl, top3[i].badge, false, false, 0.5);
    }

    ctx.globalAlpha = 0.5;
    setFont(18, '600');
    ctx.fillStyle = DIM;
    ctx.textAlign = 'center';
    ctx.fillText('...', cx, startY + 30 * S + 3 * (rowH + gap) + rowH / 2);
    ctx.globalAlpha = 1;

    const youSectionY = startY + 30 * S + 4 * (rowH + gap);
    for (let i = 0; i < nearbyRanks.length; i++) {
      const e = nearbyRanks[i];
      const rowX = cx - rowW / 2;
      const rowY = youSectionY + i * (rowH + gap);
      drawRow(rowX, rowY, rowW, rowH, e.rank, e.name, e.pnl, e.badge, e.isYou, e.isYou, e.isYou ? 1 : 0.7);
    }
  } else {
    // Near top, show full top section
    const merged = [];
    for (let r = 1; r <= Math.max(8, currentRank + 2); r++) {
      if (r === currentRank) {
        merged.push({ rank: r, name: YOU_NAME, pnl: currentPnl, badge: r <= 3 ? ['\u{1F451}','\u{1F3C6}','\u{1F947}'][r-1] : '', isYou: true });
      } else {
        const e = FULL_BOARD.find(b => b.rank === r);
        if (e) {
          const adjustedRank = r >= currentRank ? r + 1 : r;
          merged.push({...e, rank: r < currentRank ? r : r + 1, isYou: false});
        } else {
          merged.push({ rank: r, name: 'Trader' + r, pnl: Math.round(4200 - r * 300), badge: '', isYou: false });
        }
      }
    }
    for (let i = 0; i < Math.min(merged.length, 8); i++) {
      const e = merged[i];
      const rowX = cx - rowW / 2;
      const rowY = startY + 30 * S + i * (rowH + gap);
      drawRow(rowX, rowY, rowW, rowH, e.rank, e.name, e.pnl, e.badge || '', e.isYou, e.isYou, e.isYou ? 1 : 0.7);
    }
  }

  // Rank indicator
  const pulseAlpha = 0.7 + 0.3 * Math.sin(climbT * 8);
  ctx.globalAlpha = pulseAlpha;
  setFont(14, '700', 'JetBrains Mono');
  ctx.fillStyle = LIME;
  ctx.textAlign = 'center';
  ctx.fillText(`RANK #${currentRank}  \u2191  $${currentPnl.toLocaleString()} PnL`, cx, H - 40 * S);

  // Particle bursts on rank changes
  for (const stage of climbStages) {
    if (Math.abs(climbT - stage.time) < 0.05 && stage.time > 0) {
      spawnParticles(cx, H * 0.5, 15, LIME, 3, 1.5);
    }
  }

  ctx.globalAlpha = 1;
  ctx.textAlign = 'left';
}

function renderPhase4(t) {
  // 14-18s: THE FINAL WEEK
  const localT = t - 14;
  const cx = W / 2;
  const cy = H / 2;

  // "THE FINAL WEEK" flash
  if (localT < 1.5) {
    const flashT = clamp01(localT / 0.6);
    const flashScale = easeOutElastic(flashT);
    const flashAlpha = localT < 1.0 ? easeOutCubic(clamp01(localT / 0.4)) : 1 - clamp01((localT - 1.0) / 0.5);

    ctx.globalAlpha = flashAlpha;
    ctx.save();
    ctx.translate(cx, cy);
    ctx.scale(flashScale, flashScale);
    setFont(40, '700');
    ctx.fillStyle = RED;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    drawTextGlow('THE FINAL WEEK', 0, 0, RED, 25);
    ctx.restore();
    ctx.globalAlpha = 1;
    ctx.textAlign = 'left';

    if (localT > 0.3 && localT < 0.4) spawnParticles(cx, cy, 20, RED, 5, 1.5);
    return;
  }

  // Show trades and PnL climbing
  const tradeT = localT - 1.5;
  const rowW = Math.min(460 * S, W * 0.85);
  const startY = H * 0.12;

  // Mini leaderboard at top showing #1, #2, #3 and you at #3
  const miniBoard = [
    { rank: 1, name: 'CryptoKing', pnl: 4820, badge: '\u{1F451}' },
    { rank: 2, name: 'GoalMachine', pnl: 4510, badge: '\u{1F3C6}' },
    { rank: 3, name: YOU_NAME, pnl: 0, badge: '\u{1F947}', isYou: true },
  ];

  // PnL counter for you
  const pnlStart = 3050;
  const trades = [
    { text: 'LONG ARS 10x', result: '+$890', time: 0.3, color: LIME },
    { text: 'SHORT MUN 5x', result: '+$420', time: 1.2, color: LIME },
    { text: 'LONG LIV 8x', result: '+$350', time: 2.0, color: LIME },
  ];

  let addedPnl = 0;
  for (const trade of trades) {
    if (tradeT > trade.time) {
      const tradeProgress = clamp01((tradeT - trade.time) / 0.5);
      addedPnl += parseInt(trade.result.replace(/[^0-9]/g, '')) * easeOutCubic(tradeProgress);
    }
  }
  const youPnl = Math.round(pnlStart + addedPnl);
  miniBoard[2].pnl = youPnl;

  // Draw mini board
  const rowH = 48 * S;
  const gapH = 6 * S;
  for (let i = 0; i < miniBoard.length; i++) {
    const e = miniBoard[i];
    const rowX = cx - rowW / 2;
    const rowY = startY + i * (rowH + gapH);
    drawRow(rowX, rowY, rowW, rowH, e.rank, e.name, e.pnl, e.badge, e.isYou || false, e.isYou || false, 1);
  }

  // Trade feed
  const feedY = startY + 3 * (rowH + gapH) + 30 * S;
  setFont(14, '600');
  ctx.fillStyle = DIM;
  ctx.textAlign = 'center';
  ctx.fillText('LIVE TRADES', cx, feedY);

  for (let i = 0; i < trades.length; i++) {
    const trade = trades[i];
    if (tradeT <= trade.time) continue;

    const entryT = clamp01((tradeT - trade.time) / 0.5);
    const alpha = easeOutCubic(entryT);
    const slideX = (1 - easeOutCubic(entryT)) * 60 * S;

    ctx.globalAlpha = alpha;
    const ty = feedY + 30 * S + i * 40 * S;

    // Trade card
    drawRoundedRect(cx - rowW / 2 + slideX, ty - 14 * S, rowW, 32 * S, 6 * S);
    ctx.fillStyle = '#0f1218';
    ctx.fill();
    ctx.strokeStyle = trade.color === LIME ? '#1a3010' : '#301a1a';
    ctx.lineWidth = 1 * S;
    ctx.stroke();

    setFont(14, '600', 'JetBrains Mono');
    ctx.fillStyle = WHITE;
    ctx.textAlign = 'left';
    ctx.fillText(`${trade.text}`, cx - rowW / 2 + 16 * S + slideX, ty);

    ctx.fillStyle = LIME;
    ctx.textAlign = 'right';
    ctx.fillText(`\u2705 ${trade.result}`, cx + rowW / 2 - 16 * S + slideX, ty);

    if (Math.abs(tradeT - trade.time - 0.1) < 0.05) {
      spawnParticles(cx + rowW / 4, ty, 8, LIME, 2.5, 1);
    }
  }

  // PnL counter
  ctx.globalAlpha = 1;
  const counterY = H - 80 * S;
  setFont(14, '500');
  ctx.fillStyle = DIM;
  ctx.textAlign = 'center';
  ctx.fillText('YOUR PnL', cx, counterY - 20 * S);
  setFont(32, '700', 'JetBrains Mono');
  ctx.fillStyle = LIME;
  drawTextGlow(`$${youPnl.toLocaleString()}`, cx, counterY + 15 * S, LIME, 12);

  ctx.globalAlpha = 1;
  ctx.textAlign = 'left';
}

let climaxConfettiFired = false;

function renderPhase5(t) {
  // 18-22s: CLIMAX - shoot to #1
  const localT = t - 18;
  const cx = W / 2;
  const rowW = Math.min(500 * S, W * 0.9);
  const rowH = 56 * S;
  const gap = 8 * S;
  const startY = H * 0.15;

  // Build up / camera shake
  const shakeIntensity = localT < 1.5 ? easeInQuad(clamp01(localT / 1.5)) * 6 * S : 0;
  const shakeX = Math.sin(localT * 40) * shakeIntensity;
  const shakeY = Math.cos(localT * 35) * shakeIntensity;

  ctx.save();
  ctx.translate(shakeX, shakeY);

  // Board state transitions
  const swapT = clamp01((localT - 1.5) / 1.2);
  const swapEased = easeOutQuint(swapT);

  const board = [
    { rank: 1, name: '', pnl: 0, badge: '\u{1F451}', isYou: false },
    { rank: 2, name: '', pnl: 0, badge: '\u{1F3C6}', isYou: false },
    { rank: 3, name: '', pnl: 0, badge: '\u{1F947}', isYou: false },
  ];

  // Interpolate positions: You go from #3 to #1, CryptoKing from #1 to #2
  // Before swap
  const beforeState = [
    { name: 'CryptoKing', pnl: 4820 },
    { name: 'GoalMachine', pnl: 4510 },
    { name: YOU_NAME, pnl: 4710 },
  ];
  const afterState = [
    { name: YOU_NAME, pnl: 5200 },
    { name: 'CryptoKing', pnl: 4820 },
    { name: 'GoalMachine', pnl: 4510 },
  ];

  for (let i = 0; i < 3; i++) {
    const before = beforeState[i];
    const after = afterState[i];
    board[i].name = swapT < 0.5 ? before.name : after.name;
    board[i].pnl = Math.round(lerp(before.pnl, after.pnl, swapEased));
    board[i].isYou = board[i].name === YOU_NAME;
  }

  // Title
  setFont(24, '700');
  ctx.fillStyle = WHITE;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('LEADERBOARD', cx, startY - 30 * S);

  // Render rows with swap animation
  for (let i = 0; i < 3; i++) {
    const e = board[i];
    const rowX = cx - rowW / 2;

    let rowY = startY + i * (rowH + gap);

    // Animate the "you" row shooting up
    if (e.isYou && swapT > 0 && swapT < 1) {
      const fromY = startY + 2 * (rowH + gap); // position 3
      const toY = startY + 0 * (rowH + gap); // position 1
      rowY = lerp(fromY, toY, swapEased);
    }

    const scale = e.isYou && localT > 2.5 ? 1 + 0.02 * Math.sin(localT * 6) : 1;
    ctx.save();
    ctx.translate(rowX + rowW / 2, rowY + rowH / 2);
    ctx.scale(scale, scale);
    ctx.translate(-(rowX + rowW / 2), -(rowY + rowH / 2));

    drawRow(rowX, rowY, rowW, rowH, e.isYou ? 1 : i + 1, e.name, e.pnl, board[i].badge, e.isYou, e.isYou, 1);
    ctx.restore();
  }

  // Confetti and crown on climax
  if (localT > 2.5 && !climaxConfettiFired) {
    climaxConfettiFired = true;
    spawnConfetti(cx, startY + rowH / 2, 120);
    spawnParticles(cx, startY + rowH / 2, 40, GOLD, 6, 3);
  }

  // "$5,000 PRIZE" glow text
  if (localT > 3.0) {
    const prizeAlpha = easeOutCubic(clamp01((localT - 3.0) / 0.8));
    ctx.globalAlpha = prizeAlpha;
    setFont(36, '700');
    ctx.fillStyle = GOLD;
    ctx.textAlign = 'center';
    drawTextGlow('\u{1F389} $5,000 PRIZE \u{1F389}', cx, startY + 3.5 * (rowH + gap), GOLD, 25);

    // Crown
    const crownT = clamp01((localT - 3.2) / 0.5);
    const crownY = lerp(startY - 80 * S, startY - 20 * S, easeOutBounce(crownT));
    ctx.globalAlpha = prizeAlpha;
    setFont(40, '400');
    ctx.fillText('\u{1F451}', cx, crownY);
  }

  ctx.restore(); // shake
  ctx.globalAlpha = 1;
  ctx.textAlign = 'left';
}

function renderPhase6(t) {
  // 22-26s: Prize breakdown
  const localT = t - 22;
  const cx = W / 2;
  const cy = H / 2;

  // Fade in title
  const titleAlpha = easeOutCubic(clamp01(localT / 0.6));
  ctx.globalAlpha = titleAlpha;
  setFont(28, '700');
  ctx.fillStyle = WHITE;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('PRIZE BREAKDOWN', cx, cy - 160 * S);

  // Prize tiers
  const prizes = [
    { emoji: '\u{1F947}', label: '1st Place (YOU)', amount: '$5,000', color: GOLD, delay: 0.4 },
    { emoji: '\u{1F948}', label: '2nd Place', amount: '$3,000', color: '#c0c0c0', delay: 0.9 },
    { emoji: '\u{1F949}', label: '3rd Place', amount: '$2,000', color: '#cd7f32', delay: 1.4 },
  ];

  const cardW = Math.min(400 * S, W * 0.8);
  const cardH = 64 * S;
  const cardGap = 12 * S;

  for (let i = 0; i < prizes.length; i++) {
    const p = prizes[i];
    if (localT < p.delay) continue;
    const entryT = clamp01((localT - p.delay) / 0.6);
    const bounce = easeOutElastic(entryT);
    const alpha = easeOutCubic(clamp01((localT - p.delay) / 0.3));

    const cardX = cx - cardW / 2;
    const cardY = cy - 100 * S + i * (cardH + cardGap);
    const offsetY = (1 - bounce) * 40 * S;

    ctx.globalAlpha = alpha;
    drawRoundedRect(cardX, cardY + offsetY, cardW, cardH, 10 * S);
    ctx.fillStyle = i === 0 ? '#1a1a08' : CARD_BG;
    ctx.fill();
    ctx.strokeStyle = i === 0 ? GOLD : CARD_BORDER;
    ctx.lineWidth = (i === 0 ? 2 : 1) * S;
    ctx.stroke();

    if (i === 0) {
      ctx.shadowColor = GOLD;
      ctx.shadowBlur = 15 * S;
      drawRoundedRect(cardX, cardY + offsetY, cardW, cardH, 10 * S);
      ctx.strokeStyle = GOLD;
      ctx.stroke();
      ctx.shadowBlur = 0;
    }

    const midY = cardY + offsetY + cardH / 2;

    setFont(28, '400');
    ctx.textAlign = 'left';
    ctx.fillText(p.emoji, cardX + 16 * S, midY);

    setFont(16, '600');
    ctx.fillStyle = i === 0 ? GOLD : WHITE;
    ctx.fillText(p.label, cardX + 60 * S, midY - 6 * S);

    setFont(20, '700', 'JetBrains Mono');
    ctx.fillStyle = i === 0 ? GOLD : LIME;
    ctx.textAlign = 'right';
    drawTextGlow(p.amount, cardX + cardW - 16 * S, midY, i === 0 ? GOLD : LIME, 8);
  }

  // Tier upgrade animation
  if (localT > 2.5) {
    const upgradeT = clamp01((localT - 2.5) / 1.0);
    const upgradeAlpha = easeOutCubic(upgradeT);
    const upgradeY = cy + 120 * S;

    ctx.globalAlpha = upgradeAlpha;
    setFont(14, '500');
    ctx.fillStyle = DIM;
    ctx.textAlign = 'center';
    ctx.fillText('TIER UPGRADE', cx, upgradeY);

    // Semi-Pro -> Elite
    const arrowProgress = easeInOutCubic(clamp01((localT - 2.8) / 0.8));

    setFont(18, '700');
    ctx.fillStyle = DIM;
    ctx.textAlign = 'right';
    ctx.fillText('Semi-Pro', cx - 30 * S, upgradeY + 35 * S);

    // Arrow
    const arrowX = cx;
    ctx.fillStyle = LIME;
    ctx.globalAlpha = upgradeAlpha * arrowProgress;
    setFont(22, '700');
    ctx.textAlign = 'center';
    ctx.fillText('\u2192', arrowX, upgradeY + 35 * S);

    ctx.globalAlpha = upgradeAlpha * arrowProgress;
    setFont(18, '700');
    ctx.fillStyle = GOLD;
    ctx.textAlign = 'left';
    drawTextGlow('Elite \u{1F451}', cx + 30 * S, upgradeY + 35 * S, GOLD, 10);

    if (upgradeT > 0.5 && upgradeT < 0.55) {
      spawnParticles(cx + 60 * S, upgradeY + 35 * S, 15, GOLD, 3, 1.5);
    }
  }

  ctx.globalAlpha = 1;
  ctx.textAlign = 'left';
}

function renderPhase7(t) {
  // 26-30s: FINALE / CTA
  const localT = t - 26;
  const cx = W / 2;
  const cy = H / 2;

  // Line 1: "Trade smarter. Climb higher."
  const line1T = clamp01(localT / 1.0);
  ctx.globalAlpha = easeOutCubic(line1T);
  setFont(30, '700');
  ctx.fillStyle = WHITE;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  drawTextGlow('Trade smarter. Climb higher.', cx, cy - 60 * S, LIME, 10);

  // Line 2: "Season 2 starts soon."
  const line2T = clamp01((localT - 0.8) / 1.0);
  ctx.globalAlpha = easeOutCubic(line2T);
  setFont(20, '500');
  ctx.fillStyle = DIM;
  ctx.fillText('Season 2 starts soon.', cx, cy);

  // CTA: notch.win
  const ctaT = clamp01((localT - 1.5) / 1.0);
  const ctaScale = easeOutElastic(ctaT);
  ctx.globalAlpha = easeOutCubic(ctaT);
  ctx.save();
  ctx.translate(cx, cy + 70 * S);
  ctx.scale(ctaScale, ctaScale);

  // CTA button bg
  const btnW = 220 * S;
  const btnH = 52 * S;
  drawRoundedRect(-btnW / 2, -btnH / 2, btnW, btnH, 12 * S);
  ctx.fillStyle = LIME;
  ctx.fill();

  // Glow
  ctx.shadowColor = LIME;
  ctx.shadowBlur = 25 * S;
  drawRoundedRect(-btnW / 2, -btnH / 2, btnW, btnH, 12 * S);
  ctx.fill();
  ctx.shadowBlur = 0;

  setFont(22, '700');
  ctx.fillStyle = '#0a0c10';
  ctx.fillText('notch.win', 0, 2 * S);
  ctx.restore();

  // Show button
  if (localT > 2.5) {
    btn.style.display = 'block';
    finished = true;
  }

  ctx.globalAlpha = 1;
  ctx.textAlign = 'left';
}

// --- MAIN LOOP ---
let lastTimestamp = 0;
let animFrameId;

function update(timestamp) {
  if (!lastTimestamp) lastTimestamp = timestamp;
  const dt = Math.min((timestamp - lastTimestamp) / 1000, 0.05);
  lastTimestamp = timestamp;

  if (started && !finished) {
    time += dt;
  }

  // Clear
  ctx.fillStyle = BG;
  ctx.fillRect(0, 0, W, H);

  // Background
  drawStars(time);

  // Subtle vignette
  const vignette = ctx.createRadialGradient(W/2, H/2, W * 0.2, W/2, H/2, W * 0.8);
  vignette.addColorStop(0, 'rgba(10,12,16,0)');
  vignette.addColorStop(1, 'rgba(10,12,16,0.6)');
  ctx.fillStyle = vignette;
  ctx.fillRect(0, 0, W, H);

  // Phase rendering
  if (time < 4) {
    renderPhase1(time);
  } else if (time < 9) {
    // Cross-fade from phase 1
    const fadeIn = clamp01((time - 3.5) / 0.5);
    ctx.globalAlpha = fadeIn;
    renderPhase2(time);
    ctx.globalAlpha = 1;
  } else if (time < 14) {
    renderPhase3(time);
  } else if (time < 18) {
    renderPhase4(time);
  } else if (time < 22) {
    renderPhase5(time);
  } else if (time < 26) {
    renderPhase6(time);
  } else {
    renderPhase7(time);
  }

  // Particles & confetti
  updateParticles(dt);
  drawParticles();

  // Progress bar
  if (started) {
    drawProgressBar(Math.min(time / TOTAL_DURATION, 1));
  }

  // Notch watermark
  ctx.globalAlpha = 0.15;
  setFont(12, '500');
  ctx.fillStyle = WHITE;
  ctx.textAlign = 'right';
  ctx.textBaseline = 'bottom';
  ctx.fillText('notch.win', W - 16 * S, H - 12 * S);
  ctx.globalAlpha = 1;
  ctx.textAlign = 'left';
  ctx.textBaseline = 'alphabetic';

  animFrameId = requestAnimationFrame(update);
}

function restart() {
  time = 0;
  started = true;
  finished = false;
  climaxConfettiFired = false;
  particles = [];
  confetti = [];
  btn.style.display = 'none';
  lastTimestamp = 0;
}

// Auto-start after fonts load
document.fonts.ready.then(() => {
  started = true;
  animFrameId = requestAnimationFrame(update);
});
</script>
