<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notch Waitlist</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { margin: 0; background: #08090b; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

const LIME = "#b2ed68";
const BG = "#08090b";
const CARD = "#0d0f13";
const BORDER = "#1a1c21";
const MUTED = "#4a4d55";
const GREEN = "#00e676";
const RED = "#ff1744";

const TEAMS = [
  { name: "Arsenal", price: 4.20, league: "EPL" },
  { name: "Liverpool", price: 5.85, league: "EPL" },
  { name: "Real Madrid", price: 8.10, league: "ESP" },
  { name: "Barcelona", price: 7.45, league: "ESP" },
  { name: "Man City", price: 4.90, league: "EPL" },
  { name: "Bayern", price: 6.30, league: "BUN" },
  { name: "Inter", price: 5.20, league: "ITA" },
  { name: "PSG", price: 5.60, league: "FRA" },
  { name: "Chelsea", price: 3.80, league: "EPL" },
  { name: "Brighton", price: 2.65, league: "EPL" },
  { name: "Napoli", price: 4.10, league: "ITA" },
  { name: "Dortmund", price: 4.45, league: "BUN" },
];

/* ═══ NAV ══════════════════════════════════════════════════ */
function Nav({ active, onChange }) {
  return (
    <div style={{ position: "fixed", top: 0, left: 0, right: 0, zIndex: 200, background: "rgba(0,0,0,0.88)", backdropFilter: "blur(12px)", borderBottom: "1px solid #222", padding: "10px 20px", display: "flex", alignItems: "center", gap: 10, fontFamily: "monospace", fontSize: 11 }}>
      <span style={{ color: "#444", marginRight: 4 }}>CONCEPTS:</span>
      {["A · Minimal", "B · Demo", "C · Social", "D · Ad-Safe"].map((l, i) => (
        <button key={i} onClick={() => onChange(i)} style={{ background: active === i ? LIME : "transparent", color: active === i ? BG : "#888", border: active === i ? "none" : "1px solid #333", padding: "5px 14px", cursor: "pointer", fontFamily: "monospace", fontSize: 10.5, fontWeight: active === i ? 700 : 400 }}>{l}</button>
      ))}
    </div>
  );
}

/* ═══ SHARED: Queue Result ════════════════════════════════ */
function QueueResult({ team, position }) {
  const [copied, setCopied] = useState(false);
  const code = useMemo(() => Math.random().toString(36).slice(2, 8), []);
  const link = `notch.win/?ref=${code}`;
  const total = position + Math.floor(Math.random() * 400) + 100;
  return (
    <div style={{ maxWidth: 480, margin: "0 auto", animation: "popIn 0.6s cubic-bezier(0.16,1,0.3,1)" }}>
      <div style={{ border: `1px solid ${BORDER}`, background: CARD, padding: "28px 24px", marginBottom: 1 }}>
        <div style={{ fontFamily: "monospace", fontSize: 10, color: MUTED, textTransform: "uppercase", letterSpacing: 2, marginBottom: 16 }}>Your free position</div>
        <div style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 24, fontWeight: 700, marginBottom: 4 }}>{team.name}</div>
        <div style={{ fontFamily: "monospace", fontSize: 12, color: MUTED, marginBottom: 20 }}>$5 long @ ${team.price.toFixed(2)}</div>
        <div style={{ background: "rgba(178,237,104,0.04)", border: `1px solid rgba(178,237,104,0.1)`, padding: "10px 14px", fontFamily: "monospace", fontSize: 10.5, color: "#666", lineHeight: 1.7 }}>We'll email you when {team.name}'s price moves.</div>
      </div>
      <div style={{ border: `1px solid ${BORDER}`, borderTop: "none", background: CARD, padding: "24px" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 20 }}>
          <div>
            <div style={{ fontFamily: "monospace", fontSize: 10, color: MUTED, letterSpacing: 2, marginBottom: 4 }}>QUEUE</div>
            <div style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 40, fontWeight: 700 }}>#{position.toLocaleString()}</div>
          </div>
          <div style={{ fontFamily: "monospace", fontSize: 11, color: MUTED }}>{total.toLocaleString()} total</div>
        </div>
        <div style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 13, fontWeight: 600, marginBottom: 12 }}>Skip the line</div>
        <div style={{ display: "flex", gap: 0, marginBottom: 14 }}>
          <div style={{ flex: 1, background: "rgba(255,255,255,0.03)", border: `1px solid ${BORDER}`, borderRight: "none", padding: "9px 12px", fontFamily: "monospace", fontSize: 11, color: "#555", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{link}</div>
          <button onClick={() => { navigator.clipboard?.writeText(`https://${link}`); setCopied(true); setTimeout(() => setCopied(false), 2000); }} style={{ background: LIME, color: BG, border: "none", padding: "9px 18px", fontFamily: "'Space Grotesk', sans-serif", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>{copied ? "Copied ✓" : "Copy"}</button>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 6 }}>
          {[{ n: "3 refs", r: "$10 bonus" }, { n: "5 refs", r: "Early access" }, { n: "10 refs", r: "Founding badge" }].map(x => (
            <div key={x.n} style={{ padding: "7px 10px", border: `1px solid ${BORDER}`, fontFamily: "monospace", fontSize: 9 }}>
              <div style={{ color: LIME, marginBottom: 2, fontWeight: 700 }}>{x.n}</div><div style={{ color: MUTED }}>{x.r}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ═══ SHARED: Team Picker ═════════════════════════════════ */
function TeamPicker({ selected, onSelect }) {
  return (
    <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(130px, 1fr))", gap: 1, background: BORDER, border: `1px solid ${BORDER}` }}>
      {TEAMS.map(t => {
        const sel = selected?.name === t.name;
        return (
          <button key={t.name} onClick={() => onSelect(t)} style={{ background: sel ? "rgba(178,237,104,0.04)" : CARD, border: "none", outline: "none", cursor: "pointer", textAlign: "left", padding: "12px 14px", position: "relative" }}>
            <div style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 12, fontWeight: 600, color: sel ? "#fff" : "#888", marginBottom: 2 }}>{t.name}</div>
            <div style={{ fontFamily: "monospace", fontSize: 12, fontWeight: 700, color: sel ? "#fff" : "#666" }}>${t.price.toFixed(2)}</div>
            {sel && <div style={{ position: "absolute", top: 6, right: 6, width: 14, height: 14, borderRadius: "50%", background: LIME, display: "flex", alignItems: "center", justifyContent: "center" }}><span style={{ color: BG, fontSize: 9, fontWeight: 900 }}>✓</span></div>}
          </button>
        );
      })}
    </div>
  );
}

/* ═══ SHARED: Phone Mockup ════════════════════════════════ */
function PhoneMockup() {
  const teams = [
    { name: "FC Barcelona", league: "La Liga", price: "$134.80", delta: "+10.1%", up: true },
    { name: "Real Madrid", league: "La Liga", price: "$134.80", delta: "+10.1%", up: true },
    { name: "Liverpool", league: "Premier League", price: "$618.00", delta: "+23.5%", up: true },
    { name: "PSG", league: "Ligue 1", price: "$354.20", delta: "-10.1%", up: false },
    { name: "Chelsea", league: "Premier League", price: "$420.25", delta: "+2.5%", up: true },
    { name: "Man United", league: "Premier League", price: "$1,304.80", delta: "-10.1%", up: false },
  ];

  return (
    <div style={{
      width: 220, background: "#111114", borderRadius: 24,
      border: "2px solid #2a2a2e", padding: "12px 0",
      overflow: "hidden", flexShrink: 0, position: "relative",
      boxShadow: "0 20px 60px rgba(0,0,0,0.5)",
    }}>
      {/* Status bar */}
      <div style={{ padding: "4px 16px 10px", display: "flex", justifyContent: "center" }}>
        <div style={{ width: 50, height: 4, borderRadius: 2, background: "#333" }} />
      </div>
      {/* Header */}
      <div style={{ padding: "0 14px 10px", textAlign: "center" }}>
        <div style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 12, fontWeight: 600, color: "#fff" }}>All markets</div>
      </div>
      {/* Playing today */}
      <div style={{ padding: "6px 14px 4px" }}>
        <div style={{ fontFamily: "monospace", fontSize: 8, color: MUTED, marginBottom: 6 }}>Playing today</div>
        <div style={{ display: "flex", gap: 6, overflow: "hidden" }}>
          {teams.slice(0, 3).map((t, i) => (
            <div key={i} style={{ background: "rgba(255,255,255,0.04)", borderRadius: 8, padding: "8px 10px", minWidth: 80 }}>
              <div style={{ fontFamily: "monospace", fontSize: 8, color: t.up ? GREEN : RED, marginBottom: 4 }}>↗ {t.delta}</div>
              <div style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 8, color: "#aaa", marginBottom: 2 }}>{t.name.split(' ').slice(-1)[0]}</div>
              <div style={{ fontFamily: "monospace", fontSize: 9, fontWeight: 700, color: "#fff" }}>{t.price}</div>
            </div>
          ))}
        </div>
      </div>
      {/* Team list */}
      <div style={{ padding: "10px 0 0" }}>
        {teams.map((t, i) => (
          <div key={i} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "8px 14px", borderBottom: "1px solid rgba(255,255,255,0.04)" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <div style={{ width: 20, height: 20, borderRadius: "50%", background: `hsl(${i * 60}, 60%, 40%)`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 7, color: "#fff", fontWeight: 700 }}>{t.name[0]}</div>
              <div>
                <div style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 9, color: "#ccc", fontWeight: 500 }}>{t.name}</div>
                <div style={{ fontFamily: "monospace", fontSize: 7, color: MUTED }}>{t.league}</div>
              </div>
            </div>
            <div style={{ textAlign: "right" }}>
              <div style={{ fontFamily: "monospace", fontSize: 9, fontWeight: 700, color: "#fff" }}>{t.price}</div>
              <div style={{ fontFamily: "monospace", fontSize: 7, color: t.up ? GREEN : RED }}>{t.delta}</div>
            </div>
          </div>
        ))}
      </div>
      {/* Nav bar */}
      <div style={{ display: "flex", justifyContent: "space-around", padding: "10px 10px 4px", borderTop: "1px solid rgba(255,255,255,0.06)", marginTop: 6 }}>
        {["Home", "Matches", "Feed", "Profile"].map(x => (
          <div key={x} style={{ fontFamily: "monospace", fontSize: 7, color: x === "Home" ? LIME : MUTED, textAlign: "center" }}>{x}</div>
        ))}
      </div>
    </div>
  );
}

/* ═══ SHARED: Product Section ═════════════════════════════ */
function ProductSection({ variant }) {
  return (
    <div style={{ borderTop: `1px solid ${BORDER}`, padding: "60px 0" }}>
      {/* Phone + description side by side */}
      <div style={{ display: "flex", gap: 40, alignItems: "center", flexWrap: "wrap", justifyContent: "center", marginBottom: 56 }}>
        <PhoneMockup />
        <div style={{ maxWidth: 300 }}>
          <div style={{ fontFamily: "monospace", fontSize: 10, color: LIME, letterSpacing: 2, marginBottom: 16 }}>THE APP</div>
          <h3 style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 22, fontWeight: 700, lineHeight: 1.2, marginBottom: 12 }}>
            {variant === "A" ? "A stock market for football." :
             variant === "B" ? "Every team has a price. You decide what it's worth." :
             "Trade the teams you already know."}
          </h3>
          <p style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 13, color: "#666", lineHeight: 1.7, marginBottom: 20 }}>
            {variant === "A"
              ? "Every team in Europe's top 5 leagues has a live price. Buy low, sell high, or hold through the season. Prices move with match results, transfers, injuries, and form."
              : variant === "B"
              ? "Arsenal wins — price goes up. Star player gets injured — price drops. You hold through it all or close whenever you want. No expiry date. No settlement."
              : "98 teams across the Premier League, La Liga, Bundesliga, Serie A, and Ligue 1. Real-time prices powered by our proprietary oracle. Available on web and mobile."}
          </p>
          <div style={{ display: "flex", flexDirection: "column", gap: 8, fontFamily: "monospace", fontSize: 11, color: "#888" }}>
            {[
              { icon: "→", text: "Go long or short any team" },
              { icon: "→", text: "Positions never expire" },
              { icon: "→", text: "Prices move 24/7 with real events" },
            ].map(x => (
              <div key={x.text} style={{ display: "flex", gap: 8, alignItems: "center" }}>
                <span style={{ color: LIME }}>{x.icon}</span> {x.text}
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* What moves price */}
      <div style={{ maxWidth: 600, margin: "0 auto" }}>
        <div style={{ fontFamily: "monospace", fontSize: 10, color: MUTED, letterSpacing: 2, marginBottom: 16, textAlign: "center" }}>WHAT MOVES THE PRICE</div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(130px, 1fr))", gap: 1, background: BORDER, border: `1px solid ${BORDER}` }}>
          {[
            { title: "Match results", ex: "Arsenal 2–0 Wolves", effect: "Price up", color: GREEN },
            { title: "Transfers", ex: "Sign a new striker", effect: "Price up", color: "#3b82f6" },
            { title: "Injuries", ex: "Saka out 3 weeks", effect: "Price down", color: RED },
            { title: "Season form", ex: "5 wins in a row", effect: "Price up", color: "#a855f7" },
          ].map(x => (
            <div key={x.title} style={{ background: CARD, padding: "14px 14px" }}>
              <div style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 12, fontWeight: 600, color: "#ccc", marginBottom: 6 }}>{x.title}</div>
              <div style={{ fontFamily: "monospace", fontSize: 10, color: MUTED, marginBottom: 4 }}>{x.ex}</div>
              <div style={{ fontFamily: "monospace", fontSize: 10, color: x.color }}>{x.effect}</div>
            </div>
          ))}
        </div>
      </div>

      {/* How it works — 3 steps */}
      <div style={{ maxWidth: 600, margin: "48px auto 0" }}>
        <div style={{ fontFamily: "monospace", fontSize: 10, color: MUTED, letterSpacing: 2, marginBottom: 16, textAlign: "center" }}>HOW IT WORKS</div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 1, background: BORDER, border: `1px solid ${BORDER}` }}>
          {[
            { step: "01", title: "Pick a team", desc: "Choose from 98 teams across Europe's top 5 leagues." },
            { step: "02", title: "Buy or sell", desc: "Go long if you believe. Short if you don't. With leverage." },
            { step: "03", title: "Hold forever", desc: "No expiry. Close when you want — tomorrow or next season." },
          ].map(s => (
            <div key={s.step} style={{ background: CARD, padding: "16px 14px" }}>
              <div style={{ fontFamily: "monospace", fontSize: 22, fontWeight: 700, color: LIME, opacity: 0.2, marginBottom: 8 }}>{s.step}</div>
              <div style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 13, fontWeight: 600, color: "#ccc", marginBottom: 4 }}>{s.title}</div>
              <div style={{ fontFamily: "monospace", fontSize: 10, color: MUTED, lineHeight: 1.6 }}>{s.desc}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Not a sportsbook callout */}
      <div style={{ maxWidth: 600, margin: "32px auto 0", border: `1px solid ${BORDER}`, background: CARD, padding: "20px 24px", display: "flex", gap: 20, alignItems: "flex-start" }}>
        <div style={{ fontFamily: "monospace", fontSize: 18, color: LIME, flexShrink: 0, lineHeight: 1 }}>≠</div>
        <div>
          <div style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 14, fontWeight: 600, color: "#ccc", marginBottom: 4 }}>This is not a sportsbook.</div>
          <div style={{ fontFamily: "monospace", fontSize: 10.5, color: MUTED, lineHeight: 1.7 }}>
            Sportsbooks give you a ticket that expires in 90 minutes. Polymarket gives you a contract that expires when the season ends.
            Notch gives you a position that never expires. You're not betting on matches — you're trading team strength.
          </div>
        </div>
      </div>
    </div>
  );
}

/* ═══ SHARED: Footer ══════════════════════════════════════ */
function Footer() {
  return (
    <div style={{ borderTop: `1px solid ${BORDER}`, padding: "24px", display: "flex", justifyContent: "space-between", fontFamily: "monospace", fontSize: 10, color: "#1a1c21" }}>
      <span>notch.win</span>
      <span>Built on Solana · Powered by KOPS AI</span>
    </div>
  );
}

/* ═══ VERSION A — MINIMAL ═════════════════════════════════ */
function VersionA() {
  const [step, setStep] = useState("email");
  const [email, setEmail] = useState("");
  const [team, setTeam] = useState(null);
  const [pos, setPos] = useState(0);

  return (
    <div>
      {step === "email" && (
        <>
          <div style={{ minHeight: "85vh", display: "flex", flexDirection: "column", justifyContent: "center", padding: "0 24px" }}>
            <div style={{ maxWidth: 480, margin: "0 auto", width: "100%", animation: "fadeUp 0.5s ease" }}>
              <div style={{ fontFamily: "monospace", fontSize: 10, color: LIME, letterSpacing: 3, marginBottom: 24 }}>notch.win</div>
              <h1 style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: "clamp(26px, 5vw, 42px)", fontWeight: 700, lineHeight: 1.15, letterSpacing: "-0.03em", marginBottom: 12 }}>
                Your loyalty lasts a lifetime.<br /><span style={{ color: MUTED }}>Your bet lasts 90 minutes.</span>
              </h1>
              <p style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 15, color: "#555", lineHeight: 1.6, marginBottom: 36 }}>
                Perpetual markets for sports teams. Buy your team. Hold through matches, transfers, seasons. No expiry.
              </p>
              <div style={{ display: "flex", gap: 0 }}>
                <input type="email" placeholder="your@email.com" value={email} onChange={e => setEmail(e.target.value)} onKeyDown={e => e.key === "Enter" && email.includes("@") && setStep("pick")}
                  style={{ flex: 1, background: "transparent", border: `1px solid ${BORDER}`, borderRight: "none", padding: "14px 18px", fontFamily: "monospace", fontSize: 14, color: "#fff" }} />
                <button onClick={() => email.includes("@") && setStep("pick")} style={{ background: LIME, color: BG, border: "none", padding: "14px 28px", fontFamily: "'Space Grotesk', sans-serif", fontSize: 14, fontWeight: 700, cursor: "pointer", whiteSpace: "nowrap" }}>Join waitlist →</button>
              </div>
              <div style={{ fontFamily: "monospace", fontSize: 10, color: "#333", marginTop: 14 }}>Get a free $5 position in your team · 4,217 people ahead of you</div>
            </div>
          </div>
          {/* Product section below fold */}
          <div style={{ padding: "0 24px" }}>
            <div style={{ maxWidth: 650, margin: "0 auto" }}><ProductSection variant="A" /></div>
          </div>
        </>
      )}
      {step === "pick" && (
        <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column", justifyContent: "center", padding: "0 24px" }}>
          <div style={{ maxWidth: 500, margin: "0 auto", width: "100%", animation: "fadeUp 0.4s ease" }}>
            <div style={{ fontFamily: "monospace", fontSize: 10, color: LIME, letterSpacing: 3, marginBottom: 20 }}>notch.win</div>
            <h2 style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 28, fontWeight: 700, marginBottom: 6 }}>Now pick your team.</h2>
            <p style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 14, color: "#555", marginBottom: 28, lineHeight: 1.6 }}>Free $5 long position at today's price.</p>
            <TeamPicker selected={team} onSelect={setTeam} />
            <button onClick={() => { if (team) { setPos(Math.floor(Math.random() * 3000) + 800); setStep("done"); } }} style={{ marginTop: 20, width: "100%", background: team ? LIME : "#222", color: team ? BG : "#555", border: "none", padding: "14px", fontFamily: "'Space Grotesk', sans-serif", fontSize: 14, fontWeight: 700, cursor: team ? "pointer" : "default" }}>
              {team ? `Claim $5 of ${team.name} →` : "Select a team"}
            </button>
          </div>
        </div>
      )}
      {step === "done" && <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", padding: "0 24px" }}><div style={{ width: "100%" }}><QueueResult team={team} position={pos} /></div></div>}
      <Footer />
    </div>
  );
}

/* ═══ VERSION B — DEMO FIRST ══════════════════════════════ */
const EVENTS = [
  { t: 0, ev: null, p: 4.20 },
  { t: 2000, ev: "You buy Arsenal", p: 4.20, tag: "OPENED", type: "action" },
  { t: 4500, ev: "Arsenal 2–0 Wolves", p: 4.52, tag: "MATCH", type: "match" },
  { t: 7000, ev: "Arsenal sign Zubimendi", p: 4.88, tag: "TRANSFER", type: "transfer" },
  { t: 9500, ev: "Saka injured — out 3 weeks", p: 4.61, tag: "INJURY", type: "injury" },
  { t: 12000, ev: "Arsenal 3–1 Chelsea", p: 4.95, tag: "MATCH", type: "match" },
  { t: 14500, ev: "You're up 17.8%", p: 4.95, type: "result" },
];

function LiveDemo() {
  const [step, setStep] = useState(0);
  const [cycle, setCycle] = useState(0);
  useEffect(() => {
    if (step >= EVENTS.length - 1) { const t = setTimeout(() => { setStep(0); setCycle(c => c + 1); }, 3500); return () => clearTimeout(t); }
    const delay = EVENTS[step + 1].t - EVENTS[step].t;
    const t = setTimeout(() => setStep(s => s + 1), delay);
    return () => clearTimeout(t);
  }, [step, cycle]);

  const cur = EVENTS[step];
  const pnl = cur.p - 4.20;
  const pnlPct = ((pnl / 4.20) * 100).toFixed(1);
  const dotC = { action: LIME, match: "#a855f7", transfer: "#3b82f6", injury: RED, result: LIME };

  return (
    <div style={{ border: `1px solid ${BORDER}`, background: CARD, maxWidth: 440, width: "100%" }}>
      <div style={{ padding: "12px 18px", borderBottom: `1px solid ${BORDER}`, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <div style={{ width: 7, height: 7, borderRadius: "50%", background: "#EF0107" }} />
          <span style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 14, fontWeight: 600 }}>Arsenal</span>
        </div>
        <span style={{ fontFamily: "monospace", fontSize: 9, color: MUTED, letterSpacing: 1 }}>DEMO</span>
      </div>
      <div style={{ padding: "16px 18px 8px" }}>
        <div style={{ display: "flex", alignItems: "baseline", gap: 10 }}>

      </div>
      <div style={{ display: "flex", justifyContent: "space-around", padding: "10px 10px 4px", borderTop: "1px solid rgba(255,255,255,0.06)", marginTop: 4 }}>
        {["Home", "Matches", "Feed", "Profile"].map(x => (
          <div key={x} style={{ fontFamily: "monospace", fontSize: 7, color: x === "Home" ? LIME : MUTED }}>{x}</div>
        ))}
      </div>
    </div>
  );
}

/* ═══ MAIN ════════════════════════════════════════════════ */
function App() {
  const [v, setV] = useState(0);
  const [k, setK] = useState(0);
  const sw = (i) => { setV(i); setK(k => k + 1); window.scrollTo(0, 0); };

  return (
    <div style={{ background: BG, minHeight: "100vh", color: "#fff" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        ::selection { background: ${LIME}; color: ${BG}; }
        input::placeholder { color: #2a2c30; }
        input:focus { outline: none; border-color: #444 !important; }
        button:hover { opacity: 0.85; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
        @keyframes popIn { from { opacity: 0; transform: translateY(20px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-6px); } to { opacity: 1; transform: translateX(0); } }
      `}</style>
      <Nav active={v} onChange={sw} />
      <div style={{ paddingTop: 52 }} key={k}>
        {v === 0 && <VersionA />}
        {v === 1 && <VersionB />}
        {v === 2 && <VersionC />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
